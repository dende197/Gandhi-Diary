    <script>
        (function() {
            const theme = localStorage.getItem('gc_theme') || 'auto';
            let resolvedTheme = theme;
            if (theme === 'auto') {
                resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            if (resolvedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <style>
        /* Essential inline styles only — flat paint color to avoid a white flash
           before style.css loads. The full satin-glass gradient/grain lives in
           style.css so it isn't duplicated/overridden here. */
        html, body {
            background-color: #fcf8fb;
            font-family: 'Hanken Grotesk', sans-serif;
        }
        html[data-theme="dark"], html.dark, html[data-theme="dark"] body, html.dark body {
            background-color: #121318;
        }
        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]):not(.light), html:not([data-theme="light"]):not(.light) body {
                background-color: #121318;
            }
        }
        
        .liquid-glass {
            background-color: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .liquid-pill {
            background-color: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .deep-shadow {
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
        }

        .liquid-shadow {
            box-shadow: 
                0 8px 24px -6px rgba(0, 0, 0, 0.06), 
                inset 0 1px 1px 0 rgba(255, 255, 255, 0.8);
        }

        .active-liquid-shadow {
            box-shadow: 
                0 15px 30px -8px rgba(0, 88, 188, 0.3), 
                0 4px 8px -2px rgba(0, 88, 188, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app-loader { position:fixed;top:0;left:0;right:0;bottom:0;background:#fcf8fb;z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity 0.22s ease-out; }
        .app-loader-ring{
            width:42px;height:42px;border-radius:50%;
            background:conic-gradient(from 0deg, #0058bc 0%, #4c4aca 50%, #adc6ff 100%);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
            animation:spin 0.85s cubic-bezier(.4,0,.2,1) infinite;
            margin:0 auto 20px;
        }
    </style>
</head>
