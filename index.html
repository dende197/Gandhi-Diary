        function renderCustomCalendar() {
            const calendarEl = document.getElementById('calendar');
            if (!calendarEl) return;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Calcola il lunedì della settimana corrente
            const d = today.getDay();
            const diffToMonday = today.getDate() - (d === 0 ? 6 : d - 1);
            const startOfCurrentWeek = new Date(new Date(today).setDate(diffToMonday));
            startOfCurrentWeek.setHours(0, 0, 0, 0);

            // Data di inizio basata sull'offset (settimane)
            const startDate = new Date(startOfCurrentWeek);
            startDate.setDate(startOfCurrentWeek.getDate() + (calendarState.weekOffset * 7));

            const endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + 13);

            const monthNames = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
            const weekLabel = `Settimana ${startDate.getDate()} ${monthNames[startDate.getMonth()]} - ${endDate.getDate()} ${monthNames[endDate.getMonth()]}`;

            let html = `
                <div class="custom-calendar">
                    <div class="calendar-header">
                        <div class="calendar-title">${weekLabel}</div>
                        <div class="calendar-nav">
                            <button onclick="navigateCalendar(-1)" title="Settimana precedente"><i class="ph ph-caret-left"></i></button>
                            <button onclick="navigateCalendar(1)" title="Settimana successiva"><i class="ph ph-caret-right"></i></button>
                       </div>
                   </div>
                    <div class="weekday-headers">
                        <div class="weekday-header">Lun</div>
                        <div class="weekday-header">Mar</div>
                        <div class="weekday-header">Mer</div>
                        <div class="weekday-header">Gio</div>
                        <div class="weekday-header">Ven</div>
                        <div class="weekday-header">Sab</div>
                        <div class="weekday-header">Dom</div>
                   </div>
                    <div class="calendar-days">
            `;

            const todayISO = getLocalDateString(today);

            const tempDate = new Date(startDate);
            for (let i = 0; i < 14; i++) {
                const dateStr = getLocalDateString(tempDate);
                const isToday = dateStr === todayISO;
                const isPast = tempDate < today && !isToday;

                let dayTasks = [];
                if (state.plannerMode === 'registro') {
                    // Badge based on DUE DATE - Show all except AI and manual quests
                    dayTasks = (state.tasks || []).filter(t => !t.id.startsWith('ai_') && t.subject !== 'QUEST' && t.due_date === dateStr);
                } else {
                    // Badge based on PLANNED DATE
                    const plannedIds = state.plannedTasks[dateStr] || [];
                    dayTasks = (state.tasks || []).filter(t => plannedIds.includes(t.id));
                }

                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${isPast ? 'past' : ''}" 
                         onclick="${isPast ? '' : `handleDayClick('${dateStr}')`}">
                        <div class="day-number">${tempDate.getDate()}</div>
                        <div class="day-events">
                            ${dayTasks.slice(0, 3).map(t => {
                    const color = getSubjectColor(t.subject);
                    const abbrev = getSubjectAbbrev(t.subject);
                    return `<div class="event-badge ${t.done ? 'done' : ''}" style="background: ${color}">${abbrev}</div>`;
                }).join('')}
                            ${dayTasks.length > 3 ? `<div class="more-events">+${dayTasks.length - 3}</div>` : ''}
                       </div>
                   </div>
                `;
                tempDate.setDate(tempDate.getDate() + 1);
            }

            html += `</div></div>`;
            calendarEl.innerHTML = html;
        }

        function togglePlanInModal(dateStr, taskId) {
            // Utilizziamo la logica esistente ma aggiorniamo il modale
            if (!state.plannedTasks[dateStr]) state.plannedTasks[dateStr] = [];
            const index = state.plannedTasks[dateStr].indexOf(taskId);

            if (index > -1) {
                state.plannedTasks[dateStr].splice(index, 1);
            } else {
                state.plannedTasks[dateStr].push(taskId);
            }

            // Persistenza locale
            saveTasks();
            // debouncedSavePlannerRemote(); // 🔥 DISABILITATO: Ora manuale

            // Aggiorna UI Calendario
            const calendarEl = document.getElementById('calendar');
            if (calendarEl && calendarEl._fullCalendar) {
                syncCalendarEvents(calendarEl._fullCalendar);
            }

            // Riaffresca il contenuto del modale per mostrare il check
            renderDayDetailModal(dateStr);

            // Feedback Home
            notifyPlannerChanged();

        /* === 2) Aggiorna SOLO la sezione “Agenda della settimana” nel Planner === */
        function updateWeeklyAgendaView() {
            if (state.view !== 'planner') return;
            const el = document.getElementById('weekly-agenda-list');
            if (!el) return;

            const plannedWithDates = [];
            Object.entries(state.plannedTasks || {}).forEach(([dateStr, taskIds]) => {
                taskIds.forEach(id => {
                    const task = state.tasks.find(t => t.id === id);
                    if (task) plannedWithDates.push({ ...task, plannedDate: dateStr });
                });
            });

            plannedWithDates.sort((a, b) => new Date(a.plannedDate) - new Date(b.plannedDate));

            // Filtra solo date da oggi in poi (non mostrare compiti passati)
            const filtered = plannedWithDates.filter(t => isFutureOrToday(t.plannedDate));

            const dayNamesShort = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
            const html = filtered.length > 0
                ? filtered.map(t => {
                    const d = new Date(t.plannedDate);
                    const dayLabel = `${dayNamesShort[d.getDay()]} ${d.getDate()}`;
                    const subjectColor = getSubjectColor(t.subject);
                    return `
                                <div class="glass-list-item" style="display:flex; align-items:center; gap:12px; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:8px;">

        /* === 3) Notifica centralizzata per aggiornare tutto in tempo reale === */
        // Helper per merge non distruttivo e robusto (Last-Write-Wins)
        function syncStateSlice(sliceName, remoteData, remoteUpdatedAt, force = false) {
            const localUpdatedAt = localStorage.getItem(lsKey('planner_updated_at')) || null;

            // Se il remoto è più nuovo (o il locale non ha timestamp), usiamo il remoto
            const remoteIsNewer = remoteUpdatedAt && (!localUpdatedAt || new Date(remoteUpdatedAt).getTime() > new Date(localUpdatedAt).getTime());

            if ((force || remoteIsNewer) && remoteData) {
                console.log(`☁️ Remote [${sliceName}] applied (force=${force}, newer=${remoteIsNewer})`);
                return remoteData;
            }

            return state[sliceName]; // Mantieni locale se locale è più nuovo o remoto invalido
        }

        function mergePlannerData(local, remote) {
            // Fallback per vecchie chiamate, ma ora preferiamo syncStateSlice
            const result = { ...remote, ...local };
            for (const date in remote) {
                if (local[date]) {
                    result[date] = [...new Set([...local[date], ...remote[date]])];
                }
            }
            return result;
        }

        async function logout() {
            if (confirm('Sei sicuro di voler disconnettere? I tuoi planner e feed saranno mantenuti.')) {

                // ✅ STEP 1: Salva userId PRIMA di clear
                const currentUserId = getUserId();
                const currentLsPrefix = getActiveProfileKey();

                if (currentUserId && currentUserId !== 'guest') {
                    console.log("💾 Salvataggio planner pre-logout per:", currentUserId);

                    // ✅ Salva in localStorage con chiave corrente PRIMA di clear
                    localStorage.setItem(`${currentLsPrefix}:planned_tasks`, JSON.stringify(state.plannedTasks || {}));
                    localStorage.setItem(`${currentLsPrefix}:stress_levels`, JSON.stringify(state.stressLevels || {}));
                    localStorage.setItem(`${currentLsPrefix}:planner_updated_at`, new Date().toISOString());

                    // ✅ Forza salvataggio sincrono su Supabase
                    try {
                        const payload = {
                            plannedTasks: state.plannedTasks || {},
                            stressLevels: state.stressLevels || {},
                            plannedDetails: {},
                            updatedAt: new Date().toISOString()
                        };

                        const response = await fetch(`${API_BASE_URL}/api/planner/${encodeURIComponent(currentUserId)}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            console.log("✅ Planner salvato su Supabase pre-logout");
                        } else {
                            console.warn("⚠️ Errore salvataggio pre-logout:", await response.text());
                        }
                    } catch (e) {
                        console.warn("⚠️ Errore salvataggio pre-logout:", e);
                    }
                }

                // ✅ STEP 2: Ora cancella sessione
                sessionManager.clear();
                if (supabaseClient) supabaseClient.auth.signOut();

                // ✅ STEP 3: Reset state MA NON cancellare plannedTasks/stressLevels
                state.isLoggedIn = false;
                state.didup.connected = false;
                state.user = { name: '', class: '' };
                state.tasks = [];
                state.voti = [];
                state.promemoria = [];
                state.isOffline = false;
                state.lastSync = null;

                // ✅ RESETTA PLANNER per il prossimo utente
                state.plannedTasks = {};
                state.stressLevels = {};

                state.view = 'login';
                if (_threadsPoller) clearInterval(_threadsPoller);
                render();
                console.log('✅ Logout completato - Planner preservato su Supabase e localStorage');
            }
        }

        function getSubjectColor(subject) {
            const s = (subject || '').trim();
            if (!s) return '#0A84FF';

            const lower = s.toLowerCase();
            if (lower.includes('ita')) return '#FF2D55';
            if (lower.includes('mat')) return '#0A84FF';
            if (lower.includes('ing')) return '#BF5AF2';
            if (lower.includes('storia') || lower.includes('geo')) return '#FF9F0A';
            if (lower.includes('scienza') || lower.includes('biol')) return '#30D158';
            if (lower.includes('fisica')) return '#64D2FF';
            if (lower.includes('arte')) return '#FF375F';
            if (lower.includes('ed')) return '#FFD60A';
            if (lower.includes('rel')) return '#64D2FF';

            // 🚀 SENIOR FIX: Hash-based color for UNIQUE identification
            let hash = 0;
            for (let i = 0; i < s.length; i++) {
                hash = s.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h = Math.abs(hash % 360);
            return `hsl(${h}, 85%, 65%)`; // Vibrant, distinct Colors
        }

        function renderAvatar(displayName, size = 44) {
            const initials = displayName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);

            // Generate stable pastel color from name
            const hash = Array.from(displayName).reduce((acc, char) => char.charCodeAt(0) + ((acc << 5) - acc), 0);
            const hue = Math.abs(hash % 360);
            const bg = `hsl(${hue}, 60%, 45%)`;

            return `
            <div style="width:${size}px; height:${size}px; background:${bg}; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:${size * 0.4}px; border:2px solid rgba(255,255,255,0.15); flex-shrink:0; pointer-events:none;">
                ${initials}
            </div>`;
        }

        async function saveProfileToServer(profileData) {
            try {
                const userId = getUserId();
                const response = await fetch(`${API_BASE_URL}/api/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        name: profileData.name || state.user.name,
                        class: profileData.class || state.user.class,
                        specialization: profileData.specialization || state.user.specialization,
                        avatar: null // Always null now
                    })
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Salvataggio profilo fallito');
                return data;
            } catch (error) {
                console.error('❌ Save profile failed:', error);
                throw error;
            }
        }

        async function loadProfileFromServer() {
            try {
                const userId = getUserId();
                if (!userId || userId === 'guest') return null;
                const response = await fetch(`${API_BASE_URL}/api/profile/${encodeURIComponent(userId)}`);
                const data = await response.json();
                if (data.success && data.data) {
                    const profile = data.data;
                    if (profile.specialization) state.user.specialization = profile.specialization;
                    if (!isValidName(state.user.name) && profile.name) state.user.name = profile.name;
                    if (!isValidClass(state.user.class) && profile.class) state.user.class = profile.class;
                    localStorage.setItem(lsKey('user'), JSON.stringify(state.user));
                    return profile;
                }
                return null;
            } catch (error) {
                return null;
            }
        }

                return;

            try {
                showBoot("Salvataggio profilo...");
                await saveProfileToServer({ name: newName });
                state.user.name = newName;
                localStorage.setItem(lsKey('user'), JSON.stringify(state.user));

                // 🔥 Sync with DIRECTORY for global search
                const myId = getUserId();
                const myName = String(state.user.name || '').toLowerCase().trim();
                for (let i = DIRECTORY.length - 1; i >= 0; i--) {
                    const d = DIRECTORY[i];
                    if (String(d.id).toLowerCase() === myId.toLowerCase() || String(d.name || '').toLowerCase().trim() === myName) {
                        DIRECTORY.splice(i, 1);

        function renderWeeklyAgenda() {
            const list = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (state.plannerMode === 'registro') {
                state.tasks.forEach(t => {
                    // Fix: Include tasks that have a valid due_date, even if slightly in the past but relevant to current view
                    // OR better: use exactly the same logic as the calendar but at an aggregate level
                    if (!t.id.startsWith('ai_') && t.subject !== 'QUEST' && t.due_date && isFutureOrToday(t.due_date)) {
                        list.push({ ...t, displayDate: t.due_date });
                    }
                });
            } else {
                Object.entries(state.plannedTasks).forEach(([dateStr, ids]) => {
                    // Ensure planned tasks for today/future are shown
                    if (isFutureOrToday(dateStr)) {
                        ids.forEach(id => {
                            const t = state.tasks.find(tk => tk.id === id);
                            if (t) list.push({ ...t, displayDate: dateStr });
                        });
                    }
                });
            }

            list.sort((a, b) => parseArgoDate(a.displayDate) - parseArgoDate(b.displayDate));

            if (!list.length) {
                return `

        function formatTimeAgo(dateInput) {
            if (!dateInput) return 'ora';
            const date = new Date(dateInput);
            if (isNaN(date.getTime())) return '';

            const diff = Date.now() - date.getTime();

            // Threshold optimization: use milliseconds directly
            if (diff < 60000) return "ora";
            const mins = Math.floor(diff / 60000);
            if (mins < 60) return mins + "m";
            const hours = Math.floor(mins / 60);
            if (hours < 24) return hours + "h";
            const days = Math.floor(hours / 24);
            return days + "d";
        }

        function formatFullDate(dateInput) {
            if (!dateInput) return '';
            const date = new Date(dateInput);
            if (isNaN(date.getTime())) return '';
            const months = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            const time = date.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            return `${day} ${month} ${year} • ${time} `;
        }

        function initGradesCharts() {
            const canvas = document.getElementById('gradesTrendCanvas');
            if (!canvas) return;

            const { ctx, rect } = setupCanvas(canvas);
            const W = rect.width, H = rect.height;

            let votiData = [...getVotiData()];
            if (state.activeSubject) {
                votiData = votiData.filter(v => (v.materia || v.subject) === state.activeSubject);
            }
            // Sort by absolute time
            votiData.sort((a, b) => parseArgoDate(a.data || a.date) - parseArgoDate(b.data || b.date));

            if (votiData.length < 2) {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.font = '700 13px Rubik';
                ctx.textAlign = 'center';
                ctx.fillText("Trend disponibile dopo 2 voti", W / 2, H / 2);
                return;
            }

            // High Precision: Calculate progressive moving average
            let sum = 0;
            const points = votiData.map((v, i) => {
                const val = parseFloat((v.valore || v.value || '0').toString().replace(',', '.'));
                sum += val;
                return {
                    val: sum / (i + 1),
                    raw: val,
                    date: v.data || v.date
                };
            });

            const padding = 30;
            const scrollX = 0; // Future: horizontal scrolling for many points
            const stepX = (W - padding * 2) / (points.length - 1);

            const values = points.map(p => p.val);
            const minV = Math.max(0, Math.min(...values) - 0.5);
            const maxV = Math.min(10, Math.max(...values, 8) + 0.5);

            function getY(val) {
                const range = maxV - minV;
                const perc = (val - minV) / range;
                return (H - padding) - perc * (H - padding * 2);
            }

            // Area Gradient (Premium look)
            const areaGrad = ctx.createLinearGradient(0, 0, 0, H);
            areaGrad.addColorStop(0, 'rgba(10, 132, 255, 0.2)');
            areaGrad.addColorStop(1, 'rgba(10, 132, 255, 0)');

            ctx.beginPath();
            ctx.moveTo(padding, getY(points[0].val));

            // Bezier Curve Smoothing
            for (let i = 0; i < points.length - 1; i++) {
                const x1 = padding + i * stepX;
                const y1 = getY(points[i].val);
                const x2 = padding + (i + 1) * stepX;
                const y2 = getY(points[i + 1].val);
                const cpX = (x1 + x2) / 2;
                ctx.bezierCurveTo(cpX, y1, cpX, y2, x2, y2);
            }

            ctx.lineTo(padding + (points.length - 1) * stepX, H);
            ctx.lineTo(padding, H);
            ctx.closePath();
            ctx.fillStyle = areaGrad;
            ctx.fill();

            // Linea (Neon Effect)
            ctx.beginPath();
            ctx.moveTo(padding, getY(points[0].val));
            for (let i = 0; i < points.length - 1; i++) {
                const x1 = padding + i * stepX;
                const y1 = getY(points[i].val);
                const x2 = padding + (i + 1) * stepX;
                const y2 = getY(points[i + 1].val);
                const cpX = (x1 + x2) / 2;
                ctx.bezierCurveTo(cpX, y1, cpX, y2, x2, y2);
            }

            ctx.strokeStyle = '#0a84ff';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(10,132,255,0.5)';
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Interactive points
            points.forEach((p, i) => {
                const x = padding + i * stepX;
                const y = getY(p.val);

                // Outer glow
                ctx.fillStyle = 'rgba(10, 132, 255, 0.3)';
                ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();

                // Point core
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
            });
        }

        function togglePomodoro() {
            if (pomodoroState.running) {
                clearInterval(pomodoroState.interval);
                pomodoroState.running = false;
            } else {
                pomodoroState.running = true;
                pomodoroState.interval = setInterval(() => {
                    pomodoroState.timeLeft--;
                    if (pomodoroState.timeLeft <= 0) {
                        clearInterval(pomodoroState.interval);
                        pomodoroState.running = false;
                        if (pomodoroState.mode === 'focus') {
                            pomodoroState.mode = 'break';
                            pomodoroState.timeLeft = 5 * 60;
                            showToast('🎉 Sessione completata! Pausa di 5 min.', 'var(--green)');

                            pomodoroState.timeLeft = 25 * 60;
                            showToast('💪 Pausa finita! Torna a studiare.', '#7c3aed');
                        }
                    }
                    const container = document.getElementById('pomodoroContainer');
                    if (container) container.innerHTML = renderFocusTimer();
                }, 1000);
            }
            const container = document.getElementById('pomodoroContainer');
            if (container) container.innerHTML = renderFocusTimer();
        }

            clearInterval(pomodoroState.interval);
            pomodoroState.running = false;
            pomodoroState.mode = 'focus';

        async function sendAIChat() {
            const input = document.getElementById('aiChatInput');
            const text = (input?.value || '').trim();
            if (!text) return;

            // Add user message
            const now = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            state.aiChatHistory.push({ role: 'user', text, ts: now });
            input.value = '';
            input.style.height = 'auto';
            render();
            render();
            setTimeout(() => {
                const chatDiv = document.getElementById('aiChatMessages');
                if (chatDiv) {
                    chatDiv.scrollTo({ top: chatDiv.scrollHeight, behavior: 'smooth' });
                }
            }, 100);

            // Build context
            const homework = (state.tasks || []).filter(t => !t.done).map(t => `- [${t.subject}] ${t.text} (scad: ${t.due_date || 'N/D'})`).join('\n');
            const exams = (state.exams || []).map(ex => `- ${ex.type} di ${ex.subject} il ${ex.date} (${ex.topic || 'gen.'})`).join('\n');
            const backlog = (state.backlog || []).map(b => `- [${b.subject}] ${b.topic}`).join('\n');
            const difficulty = (state.difficulty || []).join(', ');
            const schedule = `Disponibilità: dalle ${state.availability?.start || '15:00'} alle ${state.availability?.end || '19:00'}`;

            const systemContext = `Sei un Tutor Accademico AI integrato in un'app di pianificazione scolastica chiamata G-Diary. Rispondi sempre in italiano. Sei amichevole, motivante e sintetico. Usa emoji.

CONTEXT STUDENTE(aggiornato):
    - COMPITI ATTIVI: ${homework || 'Nessuno.'}
    - VERIFICHE: ${exams || 'Nessuna.'}
    - ARRETRATI: ${backlog || 'Nessuno.'}
    - MATERIE DIFFICILI: ${difficulty || 'Nessuna.'}
    - ${schedule}
    - DATA ODIERNA: ${new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}

QUANDO SUGGERISCI UN PIANO DI STUDIO:
    - Usa orari precisi(es. 15:30 - 16:15)
    - Indica materia e argomento per ogni slot
    - Includi pause
    - Prioritizza verifiche imminenti e materie difficili`;

            // Build conversation for Gemini
            const contents = [
                { role: 'user', parts: [{ text: systemContext }] },
                { role: 'model', parts: [{ text: 'Capito! Sono il tuo tutor AI. Come posso aiutarti oggi? 📚' }] }
            ];
            state.aiChatHistory.forEach(msg => {
                contents.push({
                    role: msg.role === 'user' ? 'user' : 'model',
                    parts: [{ text: msg.text }]
                });
            });

            const maxRetries = 3;
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const url = `https://g-connect-backend.onrender.com/api/ai/chat`; // 🔥 Use backend proxy
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: contents })
                    });

                    const data = await response.json();

                    // Check for rate limit (429) or quota errors - retry
                    if (response.status === 429 || (data?.error?.code === 429) || (data?.error?.message && data.error.message.toLowerCase().includes('quota'))) {
                        // Friendly Error Handler for overload
                        if (attempt < maxRetries) {
                            const waitSec = attempt * 5;
                            console.warn(`Rate limit. Retrying in ${waitSec}s...`);
                            await new Promise(resolve => setTimeout(resolve, waitSec * 1000));
                            continue;
                        } else {
                            state.aiChatHistory.push({ role: 'ai', text: `⚠️ I server di Google sono molto occupati al momento. Riprova tra un attimo!`, ts: now });
                            break;
                        }
                    }

                    if (data?.candidates?.[0]?.content?.parts?.[0]?.text) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        const hasPlan = /\d{1,2}[:.:]\d{2}/.test(aiText);
                        state.aiChatHistory.push({ role: 'ai', text: aiText, ts: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' }), hasPlan });
                        state.aiResponse = aiText;
                    } else if (data?.error) {
                        // Handle 503 specifically
                        if (data.error.code === 503) {
                            state.aiChatHistory.push({ role: 'ai', text: `🚧 L'IA sta riposando (Server Overload). Riprova tra poco!`, ts: now });
                        } else {
                            state.aiChatHistory.push({ role: 'ai', text: `⚠️ Errore API: ${data.error.message || 'Errore sconosciuto'}`, ts: now });
                        }
                    } else {
                        state.aiChatHistory.push({ role: 'ai', text: '⚠️ Risposta non valida dall\'API. Riprova.', ts: now });
                    }
                    break; // Success or non-retryable error, exit loop
                } catch (error) {
                    console.error('AI Chat Error:', error);
                    if (attempt === maxRetries) {
                        state.aiChatHistory.push({ role: 'ai', text: `⚠️ Errore di connessione: ${error.message}`, ts: now });
                    } else {
                        await new Promise(resolve => setTimeout(resolve, 3000));
                    }
                }
            }

            localStorage.setItem(lsKey('ai_chat'), JSON.stringify(state.aiChatHistory));
            render();
            setTimeout(() => {
                const chatDiv = document.getElementById('aiChatMessages');
                if (chatDiv) chatDiv.scrollTop = chatDiv.scrollHeight;
            }, 50);
        }

        function applyAIPlanFromChat(msgIndex) {
            const msg = state.aiChatHistory[msgIndex];
            if (!msg || msg.role !== 'ai') return;

            const text = msg.text;
            const todayStr = getLocalDateString();
            const lines = text.split('\n');
            let addedCount = 0;

            lines.forEach(line => {
                // Match patterns like: "15:30-16:15 Materia - Argomento" or "15:30 Materia"
                const timeMatch = line.match(/(\d{1,2}[:.:]\d{2})/);
                if (timeMatch) {
                    const time = timeMatch[1];
                    // Clean line from time and bullet points
                    let clean = line.replace(/^[*\-\d.\s]+/, '').replace(time, '').replace(/[\-:]/, '').trim();
                    if (clean && clean.length > 2) {
                        const parts = clean.split(/[ \-–—]/);
                        const subject = parts[0];
                        const topic = parts.slice(1).join(' ').trim() || 'Studio';

                        const todayStr = getLocalDateString();

                        // Deduplication: check if a similar task already exists for today/subject
                        const existing = state.tasks.find(et =>
                            et.due_date === todayStr &&
                            et.subject.toLowerCase() === subject.toLowerCase() &&
                            (et.id.startsWith('t_') || et.subject === 'QUEST')
                        );

                        if (existing) {
                            // Use existing task
                            if (!state.plannedTasks[todayStr]) state.plannedTasks[todayStr] = [];
                            if (!state.plannedTasks[todayStr].includes(existing.id)) {
                                state.plannedTasks[todayStr].push(existing.id);
                            }
                        } else {
                            // Create new AI task
                            const newTask = {
                                id: 'ai_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                                subject: subject.charAt(0).toUpperCase() + subject.slice(1),
                                text: `[AI] ${time}: ${topic}`,
                                due_date: todayStr,
                                done: false,
                                created_at: new Date().toISOString()
                            };
                            state.tasks.push(newTask);

                            // Auto-plan for today in Studio mode
                            if (!state.plannedTasks[todayStr]) state.plannedTasks[todayStr] = [];
                            state.plannedTasks[todayStr].push(newTask.id);
                        }

                        addedCount++;
                    }
                }
            });

            if (addedCount > 0) {
                saveTasks();
                // if (typeof debouncedSavePlannerRemote === 'function') debouncedSavePlannerRemote(); // 🔥 DISABILITATO
                showToast(`✅ ${addedCount} task aggiunti al Planner per oggi!`, 'var(--green)');
                // Give a bit of time for the toast before navigating
                setTimeout(() => navigate('planner'), 800);
            } else {
                showToast('⚠️ Non ho trovato orari chiari nel messaggio. Prova a chiedere un piano orario!', 'var(--orange)');
            }
        }

        async function checkServerHealth(attempt = 1) {
            const statusEl = document.getElementById('server-status');
            if (!statusEl) return;

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 3500);

                const res = await fetch(`${API_BASE_URL}/health`, {
                    method: 'GET',
                    signal: controller.signal
                });
                clearTimeout(id);

                if (res.ok) {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--green); border-radius: 50%;"></span> Server Online`;
                    statusEl.style.color = "var(--green)";
                } else {
                    throw new Error("Server error");
                }
            } catch (e) {
                if (attempt < 15) {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--orange); border-radius: 50%;"></span> Sveglio il server (${attempt})...`;
                    setTimeout(() => checkServerHealth(attempt + 1), 2500);
                } else {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--red); border-radius: 50%;"></span> Offline (uso dati cached)`;
                    statusEl.style.color = "var(--red)";
                }
            }
        }

        async function performArgoSync(profileIndex = null, passedCreds = null) {
            const inputSchool = document.getElementById('argo-school');
            const inputUser = document.getElementById('argo-user');
            const inputPass = document.getElementById('argo-pass');

            const credentials = passedCreds || {
                schoolCode: (inputSchool ? inputSchool.value : (tempCreds.school || "")).trim(),
                username: (inputUser ? inputUser.value : (tempCreds.user || "")).trim(),
                password: inputPass ? inputPass.value : (tempCreds.pass || "")
            };

            if (!credentials.schoolCode || !credentials.username || !credentials.password) {
                alert("Dati mancanti! Reinserisci le credenziali.");
                if (!inputSchool) render();
                return;
            }

            if (inputSchool) tempCreds = { school: credentials.schoolCode, user: credentials.username, pass: credentials.password };

            setLoginBtnText("Connessione... ");

            try {
                const payload = {
                    schoolCode: credentials.schoolCode,
                    username: credentials.username,
                    password: credentials.password,
                    profileIndex: profileIndex
                };

                // Fallback a profilo salvato se non specificato
                if (profileIndex === null) {
                    const savedSession = sessionManager.load();
                    if (savedSession && savedSession.profileIndex !== undefined) {
                        payload.profileIndex = savedSession.profileIndex;
                    }
                }

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);

                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (response.ok && data.status === 'MULTIPLE_PROFILES') {
                    showProfileSelectionModal(data.profiles, credentials);
                    return;
                }

                if (!response.ok) throw new Error(data.error || "Errore Server");

                if (data.success) {
                    handleLoginSuccess(data, credentials.password);
                } else {
                    throw new Error(data.error || "Login fallito");
                }
            } catch (e) {
                console.error("❌ Login error:", e);
                alert(e.name === 'AbortError' ? "⚠️ Tempo scaduto!" : "❌ Errore: " + e.message);
                navigate('login');
            } finally {
                setLoginBtnText("Accedi");
            }
        }

        async function handleLoginSuccess(data, rawPassword) {
            console.log("✅ Login OK, hydrating state...");
            const user = data.session.userName;
            const pass = rawPassword || tempCreds.pass;

            // 1. Session Atomic Update
            if (data.session) {
                const sessionData = {
                    ...data.session,
                    storedUser: btoa(unescape(encodeURIComponent(user))),
                    storedPass: btoa(unescape(encodeURIComponent(pass))),
                    studentId: data.student?.id || generatePid(data.session.schoolCode, data.session.userName, data.session.profileIndex),
                    name: data.student?.name || data.selectedProfile?.name,
                    class: data.student?.class || data.selectedProfile?.class,
                    specialization: data.student?.specialization || data.selectedProfile?.specialization,
                    avatar: data.student?.avatar || data.selectedProfile?.avatar
                };
                sessionManager.save(sessionData);
            }

            // 2. Identity Atomic Update
            const incoming = data.student || data.selectedProfile || {};
            state.user = {
                ...state.user,
                id: data.student?.id || (data.session ? generatePid(data.session.schoolCode, data.session.userName, data.session.profileIndex) : 'guest'),
                name: (incoming.name && isValidName(incoming.name)) ? incoming.name : (state.user?.name || "Studente"),
                class: (incoming.class && isValidClass(incoming.class)) ? incoming.class : (state.user?.class || "N/D"),
                specialization: incoming.specialization || state.user?.specialization,
                avatar: incoming.avatar || state.user?.avatar || null
            };
            localStorage.setItem(lsKey('user'), JSON.stringify(state.user));

            // 3. Supabase Auth Bridge (with hashing)
            try {
                const school = (data.session.schoolCode || '').toUpperCase();
                const userName = data.session.userName.toLowerCase();
                const supabaseEmail = `argo.${school}.${userName.replace(/\./g, '_')}@g-connect.it`;
                const supabasePassword = await hashPassword(`Argo_${school}_${userName}_${pass}`);

                let { data: authData, error: authErr } = await supabaseClient.auth.signInWithPassword({
                    email: supabaseEmail,
                    password: supabasePassword
                });

                if (authErr && authErr.message?.includes('Invalid login')) {
                    const { data: upData, error: upErr } = await supabaseClient.auth.signUp({
                        email: supabaseEmail,
                        password: supabasePassword,
                        options: { data: { name: state.user.name, class: state.user.class } }
                    });
                    if (!upErr && upData?.user) authData = upData;
                }

                if (authData?.user) {
                    await supabaseClient.from('profiles').upsert({
                        id: String(state.user.id).toLowerCase().replace(/\s+/g, ''),
                        name: state.user.name,
                        class: state.user.class,
                        specialization: state.user.specialization,
                        avatar: state.user.avatar || null,
                        last_active: new Date().toISOString()
                    });
                }
            } catch (ex) {
                console.warn("⚠️ Supabase Bridge failed:", ex.message);
            }

            // 4. Planner Sync REMOVED from auto-flow (v1.1.32.11)
            // L'utente deve cliccare Carica per avere il piano.
            // Questo evita race conditions con l'argo sync che sta per partire.
            state.syncing = false;
            state.plannedTasks = JSON.parse(localStorage.getItem(lsKey('planned_tasks')) || '{}');

            state.stressLevels = JSON.parse(localStorage.getItem(lsKey('stress_levels')) || '{}');
            state.stressVents = JSON.parse(localStorage.getItem(lsKey('stress_vents')) || '{}');
            state.reminders = JSON.parse(localStorage.getItem(lsKey('reminders')) || '[]');

            notifyPlannerChanged();

            // 5. Data Hydration & Success
            if (data.tasks) updateTasks(data.tasks, false);
            if (data.voti) {
                state.voti = Array.isArray(data.voti) ? data.voti : [];
                localStorage.setItem(lsKey('voti'), JSON.stringify(state.voti));
            }

            state.isLoggedIn = true;
            state.didup.connected = true;
            state.isOffline = false;
            state.lastSync = new Date().toLocaleTimeString();
            updateOfflineBadge();

            Promise.all([
                loadProfileFromServer().catch(e => console.error("Profile load failed:", e))
            ]).then(() => {
                closeModal();
                alert(`✅ Benvenuto ${state.user.name}!`);
                navigate('home');
                render();
                startThreadsPolling();
            });
        }

        function isValidName(name) {
            if (!name || typeof name !== 'string') return false;
            const trimmed = name.trim();
            if (trimmed.length < 2) return false;
            return /^[a-zA-ZÀ-ÿ0-9\s'.\-]+$/.test(trimmed);
        }

        function isValidClass(cls) {
            if (!cls) return false;
            const s = String(cls).trim().toUpperCase();
            return s.length >= 1 && s.length <= 20;
        }

        function togglePlannerMenu(event) {
            if (event) event.stopPropagation();
            const menu = document.getElementById('planner-cloud-menu');
            const btn = event?.currentTarget || event?.target?.closest('button');
            if (!menu || !btn) return;

            const isVisible = menu.classList.contains('active');

            // Chiudi tutti gli altri eventuali dropdown prima
            document.querySelectorAll('.planner-dropdown-content').forEach(el => {
                if (el !== menu) {
                    el.classList.remove('active');
                    el.style.display = 'none';
                }
            });

            if (!isVisible) {
                // 🚀 TELETRASPORTO: Esci dai contenitori padri (v1.1.56)
                if (menu.parentElement !== document.body) {
                    document.body.appendChild(menu);
                }

                // Calcola posizione esatta sullo schermo 
                const isMobile = window.innerWidth <= 768;
                const menuWidth = isMobile ? 240 : 300;

                const updatePosition = () => {
                    const rect = btn.getBoundingClientRect();
                    let rightEdge = window.innerWidth - rect.right;
                    if (rightEdge < 8) rightEdge = 8;

                    menu.style.setProperty('position', 'fixed', 'important');
                    menu.style.setProperty('top', (rect.bottom + 8) + 'px', 'important');
                    menu.style.setProperty('right', rightEdge + 'px', 'important');
                    menu.style.setProperty('left', 'auto', 'important');
                    menu.style.setProperty('z-index', '2147483647', 'important');
                    menu.style.setProperty('width', menuWidth + 'px', 'important');
                    menu.style.setProperty('min-width', menuWidth + 'px', 'important');
                    menu.style.setProperty('display', 'flex', 'important');
                    menu.style.setProperty('flex-direction', 'column', 'important');
                };

                updatePosition();
                menu.classList.add('active');

                // Gestore chiusura universale
                const closeHandler = (e) => {
                    if (!menu.contains(e.target) && !btn.contains(e.target)) {
                        menu.classList.remove('active');
                        menu.style.display = 'none';
                        document.removeEventListener('click', closeHandler);
                        window.removeEventListener('scroll', updatePosition, true);
                    }
                };

                setTimeout(() => {
                    document.addEventListener('click', closeHandler);
                    window.addEventListener('scroll', updatePosition, true);
                }, 10);
            } else {
                menu.classList.remove('active');
                menu.style.display = 'none';
            }
        }

        function updateTaskUI(taskId, isDone) {
            const checkbox = document.querySelector(`[data-task-toggle="${taskId}"]`);
            const taskText = document.querySelector(`[data-task-text="${taskId}"]`);

            if (checkbox) {
                checkbox.style.transition = 'all 0.3s cubic-bezier(0.16, 1, 0.3, 1)';

                if (isDone) {
                    checkbox.style.background = 'var(--green, #30D158)';
                    checkbox.style.borderColor = 'var(--green, #30D158)';
                    checkbox.innerHTML = '<i class="ph-bold ph-check" style="font-size: 10px; color: black;"></i>';
                } else {
                    checkbox.style.background = 'transparent';
                    checkbox.style.borderColor = 'rgba(255,255,255,0.2)';
                    checkbox.innerHTML = '';
                }

                checkbox.style.transform = 'scale(0.85) translateZ(0)';
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        checkbox.style.transform = 'scale(1) translateZ(0)';
                    }, 50);
                });
            }

            if (taskText) {
                taskText.style.transition = 'all 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                if (isDone) {
                    taskText.style.opacity = '0.5';
                    taskText.style.textDecoration = 'line-through';
                } else {
                    taskText.style.opacity = '1';
                    taskText.style.textDecoration = 'none';
                }
            }
        }

        /* 3A) STRESS: onda animata (livello 0-10) */
        function renderStressWave(level = 5) {
            if (__stressWaveRAF) cancelAnimationFrame(__stressWaveRAF);
            const canvas = document.getElementById('stressWaveCanvas');
            if (!canvas) return;
            const { ctx, rect } = setupCanvas(canvas);
            const W = rect.width, H = rect.height;

            // Parametri onda in base al livello (Dynamic Speed)
            const ampBase = 12;
            const amp = ampBase * (0.5 + (level / 10) * 0.5);
            const freq = 0.02;
            const speed = 0.02 + (level / 10) * 0.08; // Più stress -> più veloce

            let t = 0;

            function strokeGradient() {
                const g = ctx.createLinearGradient(0, 0, W, 0);
                g.addColorStop(0.00, 'rgba(255,255,255,0.4)');
                g.addColorStop(0.50, 'rgba(255,255,255,0.8)');
                g.addColorStop(1.00, 'rgba(255,255,255,0.4)');
                return g;
            }

            function draw() {
                if (!document.getElementById('stressWaveCanvas')) {
                    cancelAnimationFrame(__stressWaveRAF);
                    __stressWaveRAF = null;
                    return;
                }
                ctx.clearRect(0, 0, W, H);

                ctx.lineWidth = 2.5;
                ctx.strokeStyle = strokeGradient();
                ctx.shadowColor = 'rgba(255,255,255,0.2)';
                ctx.shadowBlur = 4;

                ctx.beginPath();
                const midY = H / 2;
                for (let x = 0; x <= W; x += 4) {
                    const y = midY + Math.sin(x * freq + t) * amp;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                t += speed;
                __stressWaveRAF = requestAnimationFrame(draw);
            }
            __stressWaveRAF = requestAnimationFrame(draw);
        }

        function renderMediaGauge(target = 0) {
            const canvas = document.getElementById('mediaGaugeCanvas');
            const valueEl = document.getElementById('mediaValue');
            if (!canvas || !valueEl) return;

            const { ctx, rect } = setupCanvas(canvas);
            const W = rect.width, H = rect.height;
            const cx = W / 2, cy = H * 0.95;
            const radius = Math.min(W, H * 2) / 2.3;
            const start = Math.PI;
            const endMax = 2 * Math.PI;
            const lineW = 12;

            if (!state.__mediaGauge) state.__mediaGauge = { current: 0, target: -1 };

            function arcGradient(val) {
                const g = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
                if (val >= 6) { g.addColorStop(0, '#30D158'); g.addColorStop(1, '#61e26c'); }
                else if (val >= 5) { g.addColorStop(0, '#FF9F0A'); g.addColorStop(1, '#ffb340'); }
                else { g.addColorStop(0, '#FF453A'); g.addColorStop(1, '#ff6b63'); }
                return g;
            }

            function drawFrame(currentVal) {
                ctx.clearRect(0, 0, W, H);
                ctx.lineWidth = lineW;
                ctx.lineCap = 'round';
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.beginPath(); ctx.arc(cx, cy, radius, start, endMax, false); ctx.stroke();

                const progress = (currentVal / 10);
                const end = start + progress * Math.PI;
                ctx.strokeStyle = arcGradient(currentVal);
                ctx.shadowColor = 'rgba(0,0,0,0.15)';
                ctx.shadowBlur = 4;
                ctx.beginPath(); ctx.arc(cx, cy, radius, start, end, false); ctx.stroke();

                const knobX = cx + radius * Math.cos(end);
                const knobY = cy + radius * Math.sin(end);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 6;
                ctx.beginPath(); ctx.arc(knobX, knobY, 7, 0, Math.PI * 2); ctx.fill();

                valueEl.textContent = (Math.round(currentVal * 100) / 100).toFixed(2);
                valueEl.style.color = currentVal >= 6 ? 'var(--green)' : (currentVal >= 5 ? 'var(--orange)' : 'var(--red)');
            }

            // Se siamo già a target, disegna frame fisso e stop
            if (state.__mediaGauge.target === target && Math.abs(state.__mediaGauge.current - target) < 0.005) {
                state.__mediaGauge.current = target;
                drawFrame(target);
                if (__mediaGaugeRAF) cancelAnimationFrame(__mediaGaugeRAF);
                __mediaGaugeRAF = null;
                return;
            }

            state.__mediaGauge.target = target;
            if (__mediaGaugeRAF) cancelAnimationFrame(__mediaGaugeRAF);

            function animate() {
                if (!document.getElementById('mediaGaugeCanvas')) {
                    __mediaGaugeRAF = null;
                    return;
                }
                const diff = target - state.__mediaGauge.current;
                if (Math.abs(diff) < 0.005) {
                    state.__mediaGauge.current = target;
                    drawFrame(target);
                    __mediaGaugeRAF = null;
                    saveTasks(); // Persisti lo stato finale
                    return;
                }
                state.__mediaGauge.current += diff * 0.08;
                drawFrame(state.__mediaGauge.current);
                __mediaGaugeRAF = requestAnimationFrame(animate);
            }

            // Disegna subito il primo frame per evitare flicker (blank canvas)
            drawFrame(state.__mediaGauge.current);
            __mediaGaugeRAF = requestAnimationFrame(animate);
        }

        function drawDetailedStressChart(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const { ctx, rect } = setupCanvas(canvas);
            const W = rect.width, H = rect.height;

            const days = 7;
            const today = new Date();
            const series = [];
            const labels = [];

            const dayNames = ["Dom", "Lun", "Mar", "Mer", "Gio", "Ven", "Sab"];

            for (let i = days - 1; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const iso = d.toISOString().slice(0, 10);
                const lv = Number(state.stressLevels?.[iso] ?? 5);
                series.push(lv);
                labels.push(dayNames[d.getDay()]);
            }

            ctx.clearRect(0, 0, W, H);

            const padding = 25;
            const stepX = (W - padding * 2) / (series.length - 1);

            function getY(val) {
                return (H - padding * 1.5) - (val / 10) * (H - padding * 2.5);
            }

            // Area Gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, 'rgba(37, 99, 235, 0.4)');
            grad.addColorStop(1, 'rgba(37, 99, 235, 0)');

            // Draw Area
            ctx.beginPath();
            ctx.moveTo(padding, getY(series[0]));
            for (let i = 1; i < series.length; i++) {
                ctx.lineTo(padding + i * stepX, getY(series[i]));
            }
            ctx.lineTo(W - padding, H - padding * 1.5);
            ctx.lineTo(padding, H - padding * 1.5);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            // Draw Line
            ctx.beginPath();
            ctx.moveTo(padding, getY(series[0]));
            for (let i = 1; i < series.length; i++) {
                ctx.lineTo(padding + i * stepX, getY(series[i]));
            }
            ctx.strokeStyle = 'var(--primary)';
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Dots & Labels
            series.forEach((val, i) => {
                const x = padding + i * stepX;
                const y = getY(val);

                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();

                // Draw Day Label
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = '800 10px inherit';
                ctx.textAlign = 'center';
                ctx.fillText(labels[i], x, H - 5);
            });
        }

        function drawWeeklyStressChart(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            // DPR-safe
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const W = rect.width, H = rect.height;

            // Calcola ultimi 7 giorni
            const days = 7;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const series = [];
            for (let i = days - 1; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const iso = d.toISOString().slice(0, 10);
                const lv = Number(state.stressLevels?.[iso] ?? 0);
                series.push({ date: iso, level: lv });
            }

            // Sfondo
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, 0, W, H);

            // Assi
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(40, 16);
            ctx.lineTo(40, H - 28);
            ctx.lineTo(W - 12, H - 28);
            ctx.stroke();

            // Linea valori (0-10)
            const minX = 52, maxX = W - 24;
            const minY = 20, maxY = H - 40;
            const stepX = (maxX - minX) / Math.max(1, series.length - 1);

            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            series.forEach((pt, i) => {
                const x = minX + i * stepX;
                const y = maxY - (pt.level / 10) * (maxY - minY);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                // punti
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
            });
            ctx.stroke();

            // Etichette giorno
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '11px system-ui';
            series.forEach((pt, i) => {
                const x = minX + i * stepX;
                const label = pt.date.slice(5); // MM-DD
                ctx.fillText(label, x - 12, H - 10);
            });
        }

        // --- CUSTOM FLOATING SCROLLBAR LOGIC ---
        function initCustomScrollbar() {
            const scroller = document.getElementById('custom-scrollbar');
            const thumb = document.getElementById('scroll-thumb');
            if (!scroller || !thumb) return;

            let fadeTimeout;
            let isScrolling = false;

            function updateScroll() {
                const viewportHeight = window.innerHeight;
                const totalHeight = document.documentElement.scrollHeight;
                const scrollY = window.pageYOffset || document.documentElement.scrollTop;

                // Don't show if content fits in one screen
                if (totalHeight <= viewportHeight + 20) {
                    scroller.classList.remove('show-scrollbar');
                    return;
                }

                scroller.classList.add('show-scrollbar');

                // Calculate thumb height proportionally
                const thumbHeight = Math.max(60, (viewportHeight / totalHeight) * viewportHeight);
                const scrollPercent = scrollY / (totalHeight - viewportHeight);
                const thumbTop = scrollPercent * (viewportHeight - thumbHeight - 20); // 20px padding

                thumb.style.height = thumbHeight + 'px';
                thumb.style.transform = `translateY(${thumbTop + 10}px)`; // Offset for floating look

                clearTimeout(fadeTimeout);
                fadeTimeout = setTimeout(() => {
                    scroller.classList.remove('show-scrollbar');
                }, 1800);
            }

            // Listen to root scroll
            window.addEventListener('scroll', updateScroll, { passive: true });
            window.addEventListener('resize', updateScroll);

            // Watch for internal height changes
            const observer = new MutationObserver(updateScroll);
            observer.observe(document.body, { childList: true, subtree: true });

            updateScroll();
        }

        // Call after DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCustomScrollbar);
        } else {
            initCustomScrollbar();
        }

        // 🚀 LATE GLOBAL EXPOSURE (Final Stability Fix)
        // Moves capture to end of file to guarantee all functions (hoisted or not) are defined.

        // 1. Capture implementations
        window.performLogin_impl = performLogin;
        window.performSync_impl = performSync;
        window.navigate_impl = navigate;
        window.render_impl = render;
        window.showQuickAddTaskModal_impl = showQuickAddTaskModal;
        window.closeModal_impl = closeModal;
        window.openArgoLogin_impl = openArgoLogin;
        window.performArgoSync_impl = performArgoSync;
        window.selectProfile_impl = selectProfile;
        window.switchProfile_impl = switchProfile;
        window.handleLoginSuccess_impl = handleLoginSuccess;
        window.checkServerHealth_impl = checkServerHealth;
        window.showProfileSelectionModal_impl = showProfileSelectionModal;
        window.showModal_impl = showModal;

        // 2. Expose safety wrappers
        const safeExpose = (name) => {
            window[name] = (...args) => {
                const impl = window[name + "_impl"];
                if (typeof impl === 'function') {
                    return impl(...args);
                }
                console.warn(`🚀 ${name} non ancora pronto...`);
            };
        };

        ['performLogin', 'performSync', 'navigate', 'render', 'showQuickAddTaskModal', 'showModal', 'closeModal', 'openArgoLogin', 'performArgoSync', 'selectProfile', 'switchProfile', 'handleLoginSuccess', 'checkServerHealth', 'showProfileSelectionModal'].forEach(safeExpose);

        // Initial Render
        document.addEventListener('DOMContentLoaded', () => {
            console.log("🚀 DOM Ready - Starting App...");
        });
    </script>
</body>

</html>
