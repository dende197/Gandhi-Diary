        // ⭐ Funzione universale per leggere le date di Argo
        function parseArgoDate(dateStr) {
            if (!dateStr) return new Date(0);
            if (dateStr instanceof Date) return new Date(dateStr.getFullYear(), dateStr.getMonth(), dateStr.getDate(), 12, 0, 0);

            if (typeof dateStr === 'string') {
                // 1. Handle YYYY-MM-DD (safe local parsing at NOON)
                const isoMatch = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
                if (isoMatch) {
                    return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]), 12, 0, 0);
                }
                // 2. Handle DD/MM/YYYY
                const itaMatch = dateStr.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
                if (itaMatch) {
                    return new Date(parseInt(itaMatch[3]), parseInt(itaMatch[2]) - 1, parseInt(itaMatch[1]), 12, 0, 0);
                }
            }

            // Fallback: forced local NOON
            const d = new Date(dateStr);
            if (!isNaN(d.getTime())) {
                return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
            }
            return new Date();
        }

        // Hash DJB2 semplice e stabile per ID deterministici
        function djb2(str) {
            let hash = 5381;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) + hash) + str.charCodeAt(i);
                hash = hash & 0xffffffff;
            }
            return (hash >>> 0).toString(36);
        }

            const iso = !isNaN(d.getTime()) ? getLocalDateString(d) : '';
            const key = `${subject}||${text}||${iso}`;
            return 't_' + djb2(key);
        }

        // --- v5.0 Robust Symmetric Threading ---
        async function hashPassword(password) {
            if (!password) return '';
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function flushOutbox() {
            const key = lsKey('outbox_planner');

            const kept = [];
            for (const it of list) {

                    const localUpdatedAt = localStorage.getItem(lsKey('planner_updated_at')) || null;

                    if (payloadUpdatedAt && localUpdatedAt &&
                        new Date(payloadUpdatedAt).getTime() < new Date(localUpdatedAt).getTime()) {
                        console.log("⏭️ Outbox planner saltato (payload più vecchio del locale)");
                        continue;

                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)

                    const data = await res.json().catch(() => ({ success: false }));

        function updateTasks(newTasks, shouldRender = false) {
            if (!newTasks) return;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // ⭐ Recupera stato 'done' persistido
            const localTasks = JSON.parse(localStorage.getItem(lsKey('tasks')) || '[]');

            // Pre-index locale per “match” (subject + text + due_date)
            const localIndex = new Map();
            for (const lt of localTasks) {
                const key = `${(lt.subject || '').toLowerCase()}||${(lt.text || '').toLowerCase()}||${lt.due_date || ''}`;
                localIndex.set(key, lt);
            }

            // Costruisci nuovi task formattati con ID STABILI
            const formatted = newTasks.map(t => {
                const rawDate = t.due_date || t.datConsegna || t.datCompito || t.dataProva || t.datGiorno || t.date;
                const dateObj = parseArgoDate(rawDate);
                const isoDate = !isNaN(dateObj.getTime()) ? getLocalDateString(dateObj) : '';

                const text = t.text || t.desCompito || "Nessuna descrizione";
                const subject = t.subject || t.materia || 'Generico';

                // match locale per preservare done
                const key = `${subject.toLowerCase()}||${text.toLowerCase()}||${isoDate}`;
                const match = localIndex.get(key);

                // ID stabile
                const id = t.id || stableTaskId({ subject, text, due_date: isoDate });

                return {
                    id,
                    text,
                    subject,
                    due_date: isoDate,
                    display_date: rawDate,
                    dateObj,
                    hasValidDate: !isNaN(dateObj.getTime()) && dateObj.getTime() > 0,
                    done: match ? !!match.done : !!t.done
                };
            });

            // ✅ PERSISTENCE FIX: Mantieni i compiti locali (AI o manuali) non presenti su Argo
            // 🔥 FIX v2: Leggi AI tasks sia da localStorage CHE da state.tasks in memoria
            //    perché saveTasks usa setTimeout(150ms) e potrebbe non aver scritto ancora
            const aiFromLocalStorage = localIndex ? Array.from(localIndex.values()).filter(t =>
                (t.id && (t.id.startsWith('ai_') || t.id.startsWith('t_'))) || t.subject === 'QUEST'
            ) : [];
            const aiFromState = (state.tasks || []).filter(t =>
                (t.id && (t.id.startsWith('ai_') || t.id.startsWith('t_'))) || t.subject === 'QUEST'
            );
            // Unisci senza duplicati (priorità a state.tasks che è più fresco)
            const aiTaskMap = new Map();
            for (const t of aiFromLocalStorage) aiTaskMap.set(t.id, t);
            for (const t of aiFromState) aiTaskMap.set(t.id, t); // sovrascrive con versione più recente
            const localQuests = Array.from(aiTaskMap.values());

            console.log(`🔍 [updateTasks] AI tasks preservati: ${localQuests.length} (${aiFromLocalStorage.length} da cache, ${aiFromState.length} da state)`);

            // Unisci QUEST locali con i nuovi task formattati
            // Usa un set per evitare duplicati se per caso lo stesso QUEST è già in formatted
            const mergedTasks = [...formatted];
            for (const qo of localQuests) {
                if (!mergedTasks.some(mt => mt.id === qo.id)) {
                    // 🔥 RE-HYDRATE: Ensure Date object is local-midnight even after JSON loading
                    qo.dateObj = parseArgoDate(qo.due_date || qo.display_date || qo.dateObj);
                    qo.hasValidDate = !isNaN(qo.dateObj.getTime()); // ⭐ FIX: Forza flag validità per AI/Manual
                    mergedTasks.push(qo);
                }
            }

            // Filtra e ordina (mantieni solo quelli futuri o oggi, inclusi i QUEST)
            // ✅ FIX: Use string-based comparison to avoid hours/timezone artifacts
            const nextTasks = mergedTasks
                .filter(t => t.hasValidDate && isFutureOrToday(t.due_date))
                .sort((a, b) => a.dateObj - b.dateObj);

            // Migrazione plannedTasks: mappa oldId -> newId usando la stessa chiave
            const newIndexByKey = new Map();
            for (const nt of nextTasks) {
                const key = `${nt.subject.toLowerCase()}||${nt.text.toLowerCase()}||${nt.due_date}`;
                newIndexByKey.set(key, nt.id);
            }
            const idMapping = new Map();
            for (const lt of localTasks) {
                const key = `${(lt.subject || '').toLowerCase()}||${(lt.text || '').toLowerCase()}||${lt.due_date || ''}`;
                const newId = newIndexByKey.get(key);
                if (newId && lt.id && lt.id !== newId) {
                    idMapping.set(lt.id, newId);
                }
            }

            // Applica migrazione agli plannedTasks senza perdere niente
            const migratedPlanned = {};
            for (const [dateStr, ids] of Object.entries(state.plannedTasks || {})) {
                const migratedIds = Array.from(new Set(ids.map(id => idMapping.get(id) || id)));
                migratedPlanned[dateStr] = migratedIds;
            }

            state.tasks = nextTasks;
            state.plannedTasks = migratedPlanned;

            saveTasks();
            if (shouldRender) window.scheduleRender();
        }

        /* === 3) Sync State Slice — v2.0.0 Clean Rewrite === */
        function syncStateSlice(sliceName, remoteData, remoteUpdatedAt, force = false) {
            const localData = state[sliceName];
            const localUpdatedAt = localStorage.getItem(lsKey('planner_updated_at')) || null;
            const remoteIsNewer = remoteUpdatedAt && (
                !localUpdatedAt ||
                new Date(remoteUpdatedAt).getTime() > new Date(localUpdatedAt).getTime()
            );
            const remoteIsEmpty = Array.isArray(remoteData)
                ? remoteData.length === 0
                : (!remoteData || Object.keys(remoteData).length === 0);
            const localHasData = Array.isArray(localData)
                ? localData.length > 0
                : (localData && Object.keys(localData).length > 0);

            // RULE 1: Force → always apply remote (used by Global Reset)
            if (force) {
                console.log(`☁️ [${sliceName}] Forced apply`);
                return remoteData;
            }
            // RULE 2: Remote is newer → apply (even if empty = intentional reset)
            if (remoteIsNewer) {
                console.log(`☁️ [${sliceName}] Remote is newer → applied`);
                return remoteData;
            }
            // RULE 3: Remote empty + local has data + NOT newer → keep local (anti-wipe)
            if (remoteIsEmpty && localHasData) {
                console.log(`🛡️ [${sliceName}] Anti-wipe: remote empty, keeping local`);
                return localData;
            }
            // RULE 4: Local empty + remote has data → hydrate from server
            if (!localHasData && !remoteIsEmpty) {
                console.log(`☁️ [${sliceName}] Hydrating from server (local was empty)`);
                return remoteData;
            }
            // Default: keep local
            return localData;
        }

        function getDailyQuote() {
            const todayStr = getLocalDateString();

                if (cached.quote && cached.date === todayStr) return cached.quote;
            } catch (e) { }
            // Se non c'è una frase per oggi, ne scegliamo una random e la salviamo
            const randomQuote = MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)];
            localStorage.setItem('mh_daily_quote', JSON.stringify({ quote: randomQuote, date: todayStr }));

        async function refreshDailyQuote(btn) {

                if (icon) icon.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                if (icon) icon.style.transform = 'rotate(360deg)';
                btn.style.opacity = '0.3';
            }

            // Scegli una frase casuale diversa dalla corrente
            const todayStr = getLocalDateString();
            const currentQuote = getDailyQuote();
            let newQuote = currentQuote;

            // Prova a prenderne una diversa per 5 volte (evita loop infiniti se lista è piccola)
            for (let i = 0; i < 5; i++) {
                newQuote = MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)];
                if (newQuote !== currentQuote) break;
            }

            localStorage.setItem('mh_daily_quote', JSON.stringify({ quote: newQuote, date: todayStr }));

            // Piccolo delay per l'effetto visivo
            await new Promise(r => setTimeout(r, 400));

            if (btn) {
                const icon = btn.querySelector('i');
                if (icon) icon.style.transform = 'rotate(0deg)';
                btn.style.opacity = '0.6';
            }

            window.scheduleRender();
        }

            stopVoiceInput(); // Chiudi microfono se aperto
            const input = document.getElementById('aiChatInput');
            const text = (input?.value || '').trim();
            if (!text) return;

            // Add user message
            state.aiChatInputValue = '';
            const now = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
            state.aiChatHistory.push({ role: 'user', text, ts: now });
            input.value = '';
            input.style.height = 'auto';
            window.scheduleRender();
            setTimeout(() => {
                const chatDiv = document.getElementById('aiChatMessages');
                if (chatDiv) {
                    chatDiv.scrollTo({ top: chatDiv.scrollHeight, behavior: 'smooth' });
                }
            }, 100);

            const today = new Date();
            const hour = today.getHours();
            const todayStr = getLocalDateString(); // YYYY-MM-DD
            const endOfWeek = new Date(today);
            endOfWeek.setDate(today.getDate() + (7 - today.getDay()));

            // Filter tasks: avoid planning for "today" if it's already afternoon (deadline passed or too late)
            const argoTasks = (state.tasks || []).filter(t => {
                if (t.done || t.id.startsWith('ai_') || t.subject === 'QUEST') return false;
                if (!t.due_date) return true;

                // If it's after 14:00, ignore tasks due today or earlier (ISO comparison is safe)
                if (hour >= 14) {
                    if (t.due_date <= todayStr) return false;
                }
                return true;
            });
            argoTasks.sort((a, b) => (a.due_date || '9999') < (b.due_date || '9999') ? -1 : 1);

            // Split into urgent (this week) and later
            const thisWeekTasks = [];
            const laterTasks = [];
            argoTasks.forEach(t => {
                const dueDate = t.due_date ? parseArgoDate(t.due_date) : null;
                const dueDateStr = dueDate ? dueDate.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' }) : 'N/D';
                const entry = `- [${t.subject}] ${t.text} → consegna: ${dueDateStr}`;
                if (dueDate && dueDate <= endOfWeek) {
                    thisWeekTasks.push(entry);
                } else {
                    laterTasks.push(entry);
                }

            for (let i = 0; i < 7; i++) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const ds = getLocalDateString(d);
                const v = state.stressLevels?.[ds];
                if (v && typeof v === 'object') stressHistory.push({ date: ds, ...v });
            }
            const avgStress = stressHistory.length
                ? (stressHistory.reduce((s, h) => s + (h.stress || 3), 0) / stressHistory.length).toFixed(1)
                : null;
            const stressBlock = stressToday
                ? `🧠 BENESSERE STUDENTE:
    - Stress: ${stressToday.stress || '?'}/5
    - Stanchezza mentale: ${stressToday.fatigue || '?'}/5
    - Ore di sonno: ${stressToday.sleep || '?'}h
    - Media stress ultimi ${stressHistory.length} giorni: ${avgStress || 'N/D'}/5`
                : 'BENESSERE STUDENTE: nessun dato inserito oggi.';

            // Compiti già pianificati nei prossimi giorni (anti-duplicazione)
            const plannedSummary = Object.entries(state.plannedTasks || {})
                .filter(([date]) => date >= todayStr)
                .map(([date, ids]) => {
                    const dayTasks = ids.map(id => {
                        const t = (state.tasks || []).find(x => x.id === id);
                        return t ? `[${t.subject}] ${t.text}` : null;
                    }).filter(Boolean);
                    return dayTasks.length ? `  ${date}: ${dayTasks.join(', ')}` : null;
                }).filter(Boolean).join('\n');

            const systemContext = `Sei G-AI, il tutor personale di G-Diary. Rispondi in italiano in modo naturale, amichevole e conciso.

DATI STUDENTE:
📅 OGGI: ${today.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
${stressBlock}

🔴 SCADENZE QUESTA SETTIMANA (PRIORITÀ ALTA):
${thisWeekTasks.length > 0 ? thisWeekTasks.join('\n') : '- Nessuna scadenza urgente'}

📋 COMPITI FUTURI:
${laterTasks.length > 0 ? laterTasks.join('\n') : '- Nessuno'}

📝 Verifiche in programma: ${exams || 'nessuna'}
⏰ ${schedule}

                    const response = await fetch(url, {

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ messages: contents })
                    });

                    const data = await response.json();

                    // Check for rate limit (429) or quota errors - retry
                    if (response.status === 429 || (data?.error?.code === 429) || (data?.error?.message && data.error.message.toLowerCase().includes('quota'))) {
                        // Friendly Error Handler for overload
                        if (attempt < maxRetries) {
                            const waitSec = attempt * 5;
                            console.warn(`Rate limit. Retrying in ${waitSec}s...`);
                            await new Promise(resolve => setTimeout(resolve, waitSec * 1000));

        function applyAIPlanFromChat(msgIndex) {
            const msg = state.aiChatHistory[msgIndex];
            if (!msg || msg.role !== 'ai') return;

            const text = msg.text;
            const todayStr = getLocalDateString();
            const lines = text.split('\n');
            let addedCount = 0;
            let currentDate = todayStr; // Data corrente durante il parsing

            // ====================================================
            // PARSER MULTI-GIORNO PROFESSIONALE
            // Riconosce intestazioni di giorno come:
            //   ## LUNEDÌ 2025-01-20
            //   **Martedì 21 gennaio**
            //   ### Mercoledì (2025-01-22)
            // e assegna i task alla data corretta
            // ====================================================
            const DAY_IT = {
                lune: 1, lunedì: 1,
                mart: 2, martedì: 2,
                merc: 3, mercoledì: 3,
                giov: 4, giovedì: 4,
                vend: 5, venerdì: 5,
                sab: 6, sabato: 6,
                dom: 0, domenica: 0
            };

            function parseItalianDateLine(line) {
                // Prova 1: data esplicita YYYY-MM-DD o DD-MM-YYYY o DD/MM/YYYY
                const isoMatch = line.match(/(\d{4}-\d{2}-\d{2})/);
                if (isoMatch) return isoMatch[1];

                const dmyMatch = line.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
                if (dmyMatch) return `${dmyMatch[3]}-${String(dmyMatch[2]).padStart(2, '0')}-${String(dmyMatch[1]).padStart(2, '0')}`;

                // Prova 2: "21 gennaio" o "gennaio 21" con anno opzionale
                const monthNames = {
                    gennaio: 1, febbraio: 2, marzo: 3, aprile: 4, maggio: 5, giugno: 6,
                    luglio: 7, agosto: 8, settembre: 9, ottobre: 10, novembre: 11, dicembre: 12
                };
                const monthNumMatch = line.match(/(\d{1,2})\s+(\w+)(?:\s+(\d{4}))?/i);
                if (monthNumMatch) {
                    const day = parseInt(monthNumMatch[1]);
                    const monthStr = monthNumMatch[2].toLowerCase();
                    const month = monthNames[monthStr];
                    const year = monthNumMatch[3] ? parseInt(monthNumMatch[3]) : new Date().getFullYear();
                    if (month && day >= 1 && day <= 31) {
                        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    }
                }
                // Prova 3: nome del giorno → calcola la data più vicina (preferendo quella corrente/futura ma gestendo offset)
                const lc = line.toLowerCase();
                for (const [key, dayNum] of Object.entries(DAY_IT)) {
                    if (lc.includes(key)) {
                        const today = new Date();
                        const currentDay = today.getDay();
                        let diff = dayNum - currentDay;

                        // Se l'AI nomina un giorno passato nella conversazione corrente, non saltiamo di 7 giorni
                        // Se diff < 0 significa che il giorno è già passato questa settimana.
                        // Lo teniamo così com'è per permettere di caricare piani generati poco fa.
                        const target = new Date(today);
                        target.setDate(today.getDate() + diff);
                        return getLocalDateString(target);
                    }
                }
                return null;
            }

            function isDayHeader(line) {
                const clean = line.replace(/[#*_\[\]]/g, '').trim();
                const lc = clean.toLowerCase();
                // È un'intestazione se contiene un nome di giorno o una data ISO
                const hasDayName = Object.keys(DAY_IT).some(k => lc.startsWith(k) || lc.includes(' ' + k));
                const hasDate = /\d{4}-\d{2}-\d{2}/.test(clean) || /\d{1,2}\s+\w+/.test(clean);
                // Ma NON deve contenere un orario (per non confondersi con i task)
                const hasTime = /\d{1,2}[:.]\d{2}/.test(clean);
                return (hasDayName || hasDate) && !hasTime;
            }

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;

                // Controlla se è un'intestazione di giorno
                if (isDayHeader(trimmed)) {
                    const parsedDate = parseItalianDateLine(trimmed);
                    if (parsedDate) {
                        currentDate = parsedDate;
                        console.log(`📅 [AI Planner] Giorno rilevato: ${trimmed} → ${currentDate}`);
                    }
                    return; // Non è un task, continua
                }

                // Controlla se contiene un orario (= è un task)
                const timeMatch = trimmed.match(/(\d{1,2})[.:](\d{2})(?:\s*[-–—]\s*\d{1,2}[.:]\d{2})?/);
                if (!timeMatch) return;

                const timeStr = `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;

                // Pulizia della riga: rimuovi markdown, bullet, orari
                let clean = trimmed
                    .replace(/^[#*\->\s•·]+/, '')           // markdown/bullet
                    .replace(/\d{1,2}[.:]\d{2}(\s*[-–—]\s*\d{1,2}[.:]\d{2})?/, '') // orario (anche range)
                    .replace(/^[:\-–—\s]+/, '')              // separatori iniziali
                    .trim();

                // Salta pause/breaks
                if (/pausa|break|☕|🍎|riposo|relax/i.test(clean)) return;

                if (!clean || clean.length < 2) return;

                // Estrai materia e argomento
                let subject = '', topic = '';
                // Rimuovi eventuali asterischi markdown attorno alle parentesi: **[Materia]** -> [Materia]
                clean = clean.replace(/\*\*\[/g, '[').replace(/\]\*\*/g, ']').replace(/\*\[/g, '[').replace(/\]\*/g, ']');

                const bracketMatch = clean.match(/^\[?([^\]\-–—:]+)[\]\-–—:\s]+(.+)$/);
                if (bracketMatch) {
                    subject = bracketMatch[1].trim();
                    topic = bracketMatch[2].trim();
                } else {
                    const words = clean.split(/\s+/);
                    subject = words[0];
                    topic = words.slice(1).join(' ').trim() || 'Studio';
                }

                // Normalizza materia rimuovendo markdown residuo (*, _), emoji e punteggiatura
                subject = subject.replace(/[^\p{L}\s]/gu, '').trim();
                subject = subject.charAt(0).toUpperCase() + subject.slice(1).toLowerCase();
                if (subject.length < 2) subject = 'Studio';

                // Deduplication
                const existing = (state.tasks || []).find(et =>
                    et.due_date === currentDate &&
                    et.subject.toLowerCase() === subject.toLowerCase() &&
                    et.text.includes(timeStr)
                );
                if (existing) {
                    if (!state.plannedTasks[currentDate]) state.plannedTasks[currentDate] = [];
                    if (!state.plannedTasks[currentDate].includes(existing.id)) {
                        state.plannedTasks[currentDate].push(existing.id);
                        addedCount++;
                    }
                    return;
                }

                // Crea nuovo task AI
                const newTask = {
                    id: 'ai_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    subject: subject,
                    text: `[AI] ${timeStr} — ${topic}`,
                    due_date: currentDate,
                    done: false,
                    created_at: new Date().toISOString()
                };
                state.tasks.push(newTask);

                if (!state.plannedTasks[currentDate]) state.plannedTasks[currentDate] = [];
                state.plannedTasks[currentDate].push(newTask.id);
                addedCount++;
                console.log(`✅ [AI Planner] Task aggiunto: ${currentDate} → ${timeStr} [${subject}] ${topic}`);
            });

            if (addedCount > 0) {
                saveTasks();
                debouncedSavePlannerRemote(300);
                // Conta i giorni distinti pianificati
                const daysPlanned = new Set(
                    Object.entries(state.plannedTasks)
                        .filter(([, ids]) => ids.some(id => (state.tasks || []).find(t => t.id === id && t.id.startsWith('ai_'))))
                        .map(([date]) => date)
                ).size;
                showToast(`✅ ${addedCount} sessioni aggiunte al Planner su ${daysPlanned} giorn${daysPlanned === 1 ? 'o' : 'i'}!`, 'var(--green)');
                setTimeout(() => navigate('planner'), 900);
            } else {
                showToast('⚠️ Non ho trovato sessioni da pianificare. Chiedi un piano con orari e giorni specifici!', 'var(--orange)');
            }
        }

        async function checkServerHealth(attempt = 1) {
            const statusEl = document.getElementById('server-status');
            if (!statusEl) return;

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 3500);

                const res = await fetch(`${API_BASE_URL}/health`, {
                    method: 'GET',
                    signal: controller.signal
                });
                clearTimeout(id);

                if (res.ok) {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--green); border-radius: 50%;"></span> Server Online`;
                    statusEl.style.color = "var(--green)";
                } else {
                    throw new Error("Server error");
                }
            } catch (e) {
                if (attempt < 15) {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--orange); border-radius: 50%;"></span> Sveglio il server (${attempt})...`;
                    setTimeout(() => checkServerHealth(attempt + 1), 2500);
                } else {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--red); border-radius: 50%;"></span> Offline (uso dati cached)`;
                    statusEl.style.color = "var(--red)";

            }

        async function performArgoSync(profileIndex = null, passedCreds = null) {
            const inputSchool = document.getElementById('argo-school');
            const inputUser = document.getElementById('argo-user');
            const inputPass = document.getElementById('argo-pass');

            const credentials = passedCreds || {
                schoolCode: (inputSchool ? inputSchool.value : (tempCreds.school || "")).trim(),
                username: (inputUser ? inputUser.value : (tempCreds.user || "")).trim(),
                password: inputPass ? inputPass.value : (tempCreds.pass || "")
            };

            if (!credentials.schoolCode || !credentials.username || !credentials.password) {
                alert("Dati mancanti! Reinserisci le credenziali.");
                if (!inputSchool) window.scheduleRender();
                return;
            }

            if (inputSchool) tempCreds = { school: credentials.schoolCode, user: credentials.username, pass: credentials.password };

            setLoginBtnText("Connessione... ");

            try {
                const payload = {
                    schoolCode: credentials.schoolCode,
                    username: credentials.username,
                    password: credentials.password,
                    profileIndex: profileIndex
                };

                // Fallback a profilo salvato se non specificato
                if (profileIndex === null) {
                    const savedSession = sessionManager.load();
                    if (savedSession && savedSession.profileIndex !== undefined) {
                        payload.profileIndex = savedSession.profileIndex;
                    }
                }

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);

                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (response.ok && data.status === 'MULTIPLE_PROFILES') {
                    showProfileSelectionModal(data.profiles, credentials);
                    return;
                }

                if (!response.ok) {
                    if (response.status === 403) {
                        throw new Error("⚠️ Argo ha bloccato la connessione (Errore 403). Attendi 5-10 minuti senza fare refresh e riprova.");
                    }
                    throw new Error(data.error || `Errore Server (${response.status})`);
                }

                if (data.success) {
                    state.isOffline = false;
                    updateOfflineBadge();
                    handleLoginSuccess(data, credentials.password);
                } else {
                    throw new Error(data.error || "Login fallito");
                }
            } catch (e) {
                console.error("❌ Login error:", e);
                alert(e.name === 'AbortError' ? "⚠️ Tempo scaduto!" : "❌ Errore: " + e.message);
                navigate('login');
            } finally {
                setLoginBtnText("Accedi");
            }
        }

        async function handleLoginSuccess(data, rawPassword) {
            console.log("✅ Login OK, hydrating state...");
            const user = data.session.userName;
            const pass = rawPassword || tempCreds.pass;

            // 1. Session Atomic Update
            if (data.session) {
                const sessionData = {
                    ...data.session,
                    storedUser: btoa(unescape(encodeURIComponent(user))),
                    storedPass: btoa(unescape(encodeURIComponent(pass))),
                    studentId: data.student?.id || generatePid(data.session.schoolCode, data.session.userName, data.session.profileIndex),
                    name: data.student?.name || data.selectedProfile?.name,
                    class: data.student?.class || data.selectedProfile?.class,
                    specialization: data.student?.specialization || data.selectedProfile?.specialization,
                    avatar: data.student?.avatar || data.selectedProfile?.avatar
                };
                sessionManager.save(sessionData);
            }

            // 2. Identity Atomic Update
            const incoming = data.student || data.selectedProfile || {};
            state.user = {
                ...state.user,
                id: data.student?.id || (data.session ? generatePid(data.session.schoolCode, data.session.userName, data.session.profileIndex) : 'guest'),
                name: (incoming.name && isValidName(incoming.name)) ? incoming.name : (state.user?.name || "Studente"),
                class: (incoming.class && isValidClass(incoming.class)) ? incoming.class : (state.user?.class || "N/D"),
                specialization: incoming.specialization || state.user?.specialization,
                avatar: incoming.avatar || state.user?.avatar || null
            };
            localStorage.setItem(lsKey('user'), JSON.stringify(state.user));

            // 3. Supabase Auth Bridge (with hashing)
            try {
                const school = (data.session.schoolCode || '').toUpperCase();
                const userName = data.session.userName.toLowerCase();
                const supabaseEmail = `argo.${school}.${userName.replace(/\./g, '_')}@g-connect.it`;
                const supabasePassword = await hashPassword(`Argo_${school}_${userName}_${pass}`);

                let { data: authData, error: authErr } = await supabaseClient.auth.signInWithPassword({
                    email: supabaseEmail,
                    password: supabasePassword
                });

                if (authErr && authErr.message?.includes('Invalid login')) {
                    const { data: upData, error: upErr } = await supabaseClient.auth.signUp({
                        email: supabaseEmail,
                        password: supabasePassword,
                        options: { data: { name: state.user.name, class: state.user.class } }

                    showBoot("Ricerca profili...");
                    const user = decodeURIComponent(escape(atob(stored.storedUser)));

                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            schoolCode: stored.schoolCode,
                            username: user,
                            password: pass,
                            profileIndex: null
                        })
                    });

                    const data = await response.json().catch(() => ({ success: false }));
                    hideBoot();

                    if (response.ok && data.status === 'MULTIPLE_PROFILES') {
                        showProfileSelectionModal(data.profiles, { schoolCode: stored.schoolCode, username: user, password: pass });
                    } else if (response.ok && data.success) {
                        handleLoginSuccess(data, pass);
                    } else {
                        openArgoLogin();
                    }
                } catch (e) {
                    hideBoot();
                    console.error("Errore switch profile:", e);
                    openArgoLogin();
                }
            } else {
                openArgoLogin();
            }
        }

        function submitCompetencyRequest() {
            const checked = [...document.querySelectorAll('.competency-check:checked')].map(c => c.value);
            if (checked.length === 0) { showToast('Seleziona almeno una materia!'); return; }

            // Save prep levels to state
            if (!state.prepLevels) state.prepLevels = {};
            document.querySelectorAll('.prep-slider').forEach(sl => {
                state.prepLevels[sl.dataset.subject] = parseInt(sl.value);
            });
            localStorage.setItem(lsKey('prep_levels'), JSON.stringify(state.prepLevels));

            const votiData = getVotiData();
            const levelLabels = { 1: 'per niente pronto', 2: 'poco pronto', 3: 'sufficientemente pronto', 4: 'abbastanza pronto', 5: 'molto pronto' };

            const details = checked.map(name => {
                const list = votiData.filter(v => (v.materia || v.subject) === name);
                const media = list.length > 0 ? (parseFloat(calcolaMedia(list)) || 0) : 0;
                const userLevel = state.prepLevels[name] || 3;
                const mediaStr = list.length > 0 ? `media: ${media.toFixed(1)}, ${list.length} voti` : 'nessun voto registrato';
                return `${name} (${mediaStr}, preparazione autodichiarata: ${userLevel}/5 — ${levelLabels[userLevel]})`;
            }).join('; ');

            closeModal();

            // Navigate to AI view first, then send
            if (state.view !== 'ai_assistant') {
                navigate('ai_assistant');
                // Wait for render to complete
                setTimeout(() => {
                    const input = document.getElementById('aiChatInput');
                    const prompt = `Sono uno studente e ho bisogno di un piano di recupero/miglioramento per le seguenti materie: ${details}. IMPORTANTE: il livello di preparazione è stato dichiarato da me studente e deve avere la priorità rispetto ai voti — posso avere buoni voti ma essere indietro con certi argomenti. Dammi un piano di studio settimanale con priorità sulle materie dove mi sento meno pronto, suggerendo argomenti chiave da ripassare e strategie di studio efficaci. Organizza tutto per priorità dal più urgente al meno urgente.`;
                    if (input) input.value = prompt;
                    sendAIChat();
                }, 400);
            } else {
                const input = document.getElementById('aiChatInput');

            }
        }







        function startStudySession() {
            // Non-blocking study timer using toast + Notification API
            const duration = window.prompt("Quanti minuti vuoi studiare?", "25");
            if (!duration || isNaN(duration)) return;
            const mins = parseInt(duration);
            showToast(`⏱️ Sessione di ${mins} min avviata! Concentrati 💪`);

            // Request notification permission for when session ends
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            setTimeout(() => {
                showToast('⏰ Sessione finita! Prenditi una pausa 🎉');
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('G-Diary', { body: '⏰ Sessione di studio finita! Prenditi una pausa.' });
                }
            }, mins * 60 * 1000);
        }
