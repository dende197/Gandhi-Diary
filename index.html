<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>G-Connect</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Forza coerenza della system bar su Android/Samsung per entrambe le modalità -->
    <meta name="theme-color" content="#0a1128" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#0a1128" media="(prefers-color-scheme: light)">
    <link
        href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Urbanist:wght@500;600;700&display=swap"
        rel="stylesheet">
    <!-- Link CSS rimosso (404 su jsdelivr per FC v6) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <!-- 🔥 Supabase Client for Realtime Chat -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-right: env(safe-area-inset-right, 0px);

            /* Palette */
            --bg-deep: #000000;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --text-dim: #64748b;

            /* Accents */
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.6);
            --secondary: #3b82f6;
            --blue: #0A84FF;
            --green: #30D158;
            --yellow: #F5D90A;
            --red: #FF453A;
            --orange: #FF9F0A;

            /* Glass (v5.0 Premium) */
            --glass-base: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-header: rgba(10, 10, 10, 0.4);

            /* Radius */
            --radius-xl: 36px;
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-md: 18px;
            --radius-sm: 14px;

            /* Z-index */
            --z-loader: 10000;
            /* Custom Metric Backgrounds */
            --media-bg-start: #3F7F6B;
            --media-bg-end: #3E5F7A;
            --stress-bg-main: #52417a;
            --stress-bg-darker: #45335F;
            --stress-bg-lighter: #6A5A96;
        }

        /* 🔄 Premium Boot Loader */
        .boot-overlay {
            position: fixed;
            inset: 0;
            z-index: 20000;
            background: radial-gradient(120% 120% at 50% 0%, rgba(16, 24, 40, 0.8) 0%, rgba(0, 0, 0, 0.92) 60%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 250ms ease;
        }

        .boot-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .boot-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px) saturate(140%);
            -webkit-backdrop-filter: blur(14px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 18px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
        }

        .boot-title {
            font-weight: 700;
            letter-spacing: .3px;
        }

        .boot-spinner {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.25);
            border-top-color: #60a5fa;
            animation: bootspin 0.9s linear infinite;
        }

        @keyframes bootspin {
            to {
                transform: rotate(360deg);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        /* Calendar container: prevenire layout shift e velocizzare paint */
        #calendar {
            min-height: 340px;
            /* spazio minimo, evita jump */
            content-visibility: auto;
            /* il browser salta paint finché non serve */
            contain: layout style paint;
            will-change: opacity, transform;
        }

        /* 🗓️ FullCalendar Overrides - Glass Aesthetic */
        .fc-theme-standard td,
        .fc-theme-standard th,
        .fc-scrollgrid {
            border: none !important;
        }

        .fc-col-header-cell-cushion {
            color: rgba(255, 255, 255, 0.6) !important;
            text-transform: uppercase;
            font-size: 11px !important;
            font-weight: 800;
            padding: 8px 0 !important;
        }

        .fc-toolbar-title {
            color: var(--text-main) !important;
            font-size: 18px !important;
            letter-spacing: -0.01em;
        }

        .fc-daygrid-day-frame {
            border-radius: 12px;
            overflow: hidden;
            margin: 2px;
            min-height: 62px !important;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .fc-daygrid-day-number {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 700 !important;
            padding: 6px !important;
        }

        .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame {
            background: rgba(37, 99, 235, 0.18);
            border: 1px solid rgba(37, 99, 235, 0.45);
        }

        .fc .fc-button-primary {
            background: rgba(255, 255, 255, 0.10);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: white;
            backdrop-filter: blur(8px);
        }

        .fc .fc-button-primary:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .fc .fc-button-active {
            background: var(--primary) !important;
            color: white !important;
        }

        .fc-event,
        .fc-daygrid-event {
            border: none !important;
            border-radius: 10px !important;
            padding: 6px 8px !important;
            font-size: 12px !important;
            line-height: 1.35 !important;
            color: #fff !important;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.35);
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.25);
        }

        .fc-daygrid-dot-event .fc-event-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ⚡ HARDWARE ACCELERATION */
        .task-checkbox,
        .plan-checkbox,
        .glass-list-item,
        .modal-content,
        button,
        [data-task-id][data-date] {
            will-change: transform;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
        }

        .task-checkbox,
        .plan-checkbox {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .task-checkbox:active,
        .plan-checkbox:active,
        [data-task-id][data-date]:active {
            transform: scale(0.9) translateZ(0) !important;
        }

        .glass-list-item {
            transition: background-color 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.2s cubic-bezier(0.16, 1, 0.3, 1),
                border-color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-list-item:active {
            transform: scale(0.98) translateZ(0);
        }

        @keyframes modalFadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .modal-overlay {
            animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }


        /* 1) Comunica al browser che la pagina è già dark: evita auto-darkening */
        html {
            color-scheme: dark;
            background: #000;
        }

        /* 2) Gradiente globale più ricco di blu, sempre attivo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, #020617 0%, #0a1128 55%, #1e3a8a 100%);
            background-attachment: fixed;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        body {
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            min-height: 100dvh;
            color: var(--text-main);
            font-family: 'Rubik', 'Urbanist', -apple-system, system-ui, sans-serif;
        }

        #app {
            height: auto;
            overflow: visible;
            width: 100%;
            max-width: 100vw;
            padding-top: var(--safe-top);
            padding-bottom: calc(140px + var(--safe-bottom));
            transition: opacity 0.15s ease-out;
        }

        .view {
            contain: layout style;
            min-height: calc(100dvh - var(--safe-top) - var(--safe-bottom) - 96px);
        }

        /* 3) Pannelli glass: blocca qualsiasi “auto-darkening” involontario */
        .card,
        .glass-panel {
            mix-blend-mode: normal;
            filter: none;
            background: rgba(255, 255, 255, 0.24);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .glass-panel {
            border-radius: var(--radius-xl);
        }

        /* 4) Rafforza un po’ i border/contrast quando il sistema è in dark */
        @media (prefers-color-scheme: dark) {

            .card,
            .glass-panel {
                background: rgba(255, 255, 255, 0.26);
                border-color: rgba(255, 255, 255, 0.30);
            }
        }

        /* 5) Overlay blu leggero per le viste con meno percezione di blu (Home, Market) */
        .page-bg {
            position: relative;
        }

        .page-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(120% 120% at 50% 0%,
                    rgba(30, 64, 175, 0.25) 0%,
                    /* #1e40af soft */
                    rgba(10, 17, 40, 0.00) 60%,
                    rgba(10, 17, 40, 0.00) 100%);
        }

        /* Centered Search header */
        .home-hero {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .home-search-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .search-big {
            min-width: 180px;
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .search-big:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
        }

        /* Profile row (no glass rectangle) */
        .profile-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 0;
            margin-bottom: 8px;
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            font-size: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            flex-shrink: 0;
        }

        .profile-meta {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tag-cinqueanna {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.18);
            color: #93c5fd;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: .3px;
            border: 1px solid rgba(59, 130, 246, 0.35);
        }

        /* Nuova Griglia Metriche (Canvas Based) - FIX MOBILE STABILITY */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 20px;
            width: 100%;
            flex: 1;
        }

        .metrics-grid>* {
            min-width: 0;
        }

        .metric-card {
            position: relative;
            border-radius: 18px;
            padding: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
            width: 100%;
            box-sizing: border-box;
            min-height: 155px;
            /* Stabilizza aspect ratio */
        }

        /* Card Stress: solo sfondo, nessun padding interno */
        .metric-card.stress {
            background: radial-gradient(circle at 50% 45%, var(--stress-bg-lighter) 0%, var(--stress-bg-main) 60%, var(--stress-bg-darker) 100%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: none;
            padding: 0;
            /* nessun padding, canvas a piena area */
            position: relative;
            overflow: hidden;
            min-height: 155px;
            /* stabilizza laltezza su mobile */
        }

        .metric-card.stress .title {
            position: absolute;
            top: 16px;
            left: 16px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 14px;
            z-index: 2;
            pointer-events: none;
        }

        .metric-card.stress::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 50%);
            pointer-events: none;
        }

        /* Canvas dell’onda a piena larghezza/altezza della card */
        #stressWaveCanvas {
            display: block;
            width: 100%;
            height: 140px;
            /* regola a piacere */
        }

        .stress-wave {
            width: 100%;
            height: 100px;
            display: block;
            border-radius: 12px;
            background: radial-gradient(80% 80% at 20% 20%, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
            position: relative;
            z-index: 1;
        }

        .stress-level-badge {
            position: absolute;
            right: 14px;
            bottom: 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        /* Card Media (vetro petrolio ad alta fedeltà) */
        .metric-card.media {
            background: linear-gradient(135deg, var(--media-bg-start) 0%, var(--media-bg-end) 100%);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: none;
        }

        .metric-card.media::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 60%);
            pointer-events: none;
        }

        .metric-card.media .title {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

        .media-gauge {
            width: 100%;
            height: 118px;
            display: block;
        }

        .media-value {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            transform: translateY(6px);
            pointer-events: none;
        }

        /* Stress selector fluido */
        .stress-level-grid {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .stress-pill {
            flex: 1;
            aspect-ratio: 1;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform .15s ease, background .15s ease, border-color .15s ease, color .15s ease;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
        }

        .stress-pill.active {
            transform: scale(1.06);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.35);
            background: var(--blue);
        }

        /* 11) Sezione Circolari spostata in basso */
        .circolari-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 0 16px 0;
            margin: 0 -24px;
            padding-left: 24px;
            scrollbar-width: none;
        }

        .circolari-row::-webkit-scrollbar {
            display: none;
        }

        .circolare-card {
            min-width: 260px;
            height: 150px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        /* Avatar circolare (fallback iniziale) */
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-fallback {
            font-weight: 800;
            color: white;
        }

        /* Bottom Nav */
        #bottom-nav {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            min-width: 300px;
            padding: 8px 24px;
            height: 72px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .nav-item {
            background: none;
            border: none;
            padding: 12px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 15px;
            width: 100%;
            cursor: pointer;
            transition: all .3s;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px;
            font-size: 15px;
            border-radius: var(--radius-md);
            font-family: inherit;
            transition: all .2s;
            backdrop-filter: blur(10px);
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            z-index: 2000;
            display: flex;
            justify-content: flex-end;
            flex-direction: column;
        }

        .modal-content {
            background: linear-gradient(180deg, rgba(15, 23, 30, 0.95) 0%, #000 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .offline-badge {
            position: fixed;
            top: calc(10px + var(--safe-top));
            right: 10px;
            background: rgba(255, 159, 10, 0.15);
            border: 1px solid var(--orange);
            color: #fb923c;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: none;
            backdrop-filter: blur(10px);
        }

        .offline-badge.show {
            display: block;
        }

        /* ✨ TYPOGRAPHY - ENTERED */
        h1,
        h2,
        h3 {
            text-align: center;
            /* ORDER */
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0;
            color: white;
            /* Clean white */
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 0;
            color: var(--text-main);
        }

        h3 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 14px;
        }

        /* 💎 CARDS (CLEAN WHITE SATIN - NO GLOW) */
        .card {
            background: rgba(255, 255, 255, 0.22);
            /* Homogeneous flat background */
            backdrop-filter: blur(30px) saturate(120%);
            -webkit-backdrop-filter: blur(30px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: none;
            /* REMOVED SHADOWS as requested */
            position: relative;
            overflow: hidden;
        }

        /* 💎 PREMIUM SATIN PANEL */
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            /* Flat homogeneous */
            backdrop-filter: blur(50px) saturate(100%);
            -webkit-backdrop-filter: blur(50px) saturate(100%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: none;
            /* REMOVED GLOWS */
            border-radius: var(--radius-xl);
        }

        /* CALENDAR ROUNDING & COMPACTING */
        .fc-theme-standard td,

        function parseArgoDate(dateString) {
            if (!dateString) return new Date(0); // Fallback per date invalide

            // Try parsing as YYYY-MM-DD (e.g., from API or ISO)
            if (typeof dateString === 'string' && dateString.match(/^\d{4}-\d{2}-\d{2}$/)) {
                return new Date(dateString + 'T00:00:00');
            }

            // Try parsing as DD/MM/YYYY (e.g., from Argo HTML)
            if (typeof dateString === 'string' && dateString.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                const [day, month, year] = dateString.split('/');
                return new Date(`${year}-${month}-${day}T00:00:00`);
            }

            // Fallback for other formats or if it's already a Date object
            try {
                const date = new Date(dateString);
                if (!isNaN(date.getTime())) return date;
            } catch (e) { }

            return new Date();

            for (let i = 0; i < str.length; i++) {

                hash = hash & 0xffffffff;
            }
            return (hash >>> 0).toString(36);

        // --- OUTBOX: anti-replay (non inviare payload più vecchi dell’ultimo timestamp locale) ---
        async function flushOutbox() {
            for (const kind of ['posts', 'market', 'planner']) {
                const key = lsKey(`outbox_${kind}`);
                const list = JSON.parse(localStorage.getItem(key) || '[]');
                if (!list.length) continue;

                const kept = [];
                for (const it of list) {
                    try {
                        if (kind === 'planner') {
                            const userId = it.userId;
                            const payload = it.payload || {};
                            const payloadUpdatedAt = payload.updatedAt || null;
                            const localUpdatedAt = localStorage.getItem(lsKey('planner_updated_at')) || null;

                            if (payloadUpdatedAt && localUpdatedAt &&
                                new Date(payloadUpdatedAt).getTime() < new Date(localUpdatedAt).getTime()) {
                                console.log("⏭️ Outbox planner saltato (payload più vecchio del locale)");
                                continue;
                            }

                            const res = await fetch(`${API_BASE_URL}/api/planner/${encodeURIComponent(userId)}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            const data = await res.json().catch(() => ({ success: false }));
                            if (data.success) {
                                if (data.data?.updatedAt) {
                                    localStorage.setItem(lsKey('planner_updated_at'), data.data.updatedAt);
                                }
                                console.log("📤 Outbox planner sincronizzato");
                            } else {
                                kept.push(it);
                            }
                        } else {
                            const endpoint = kind === 'posts' ? `${API_BASE_URL}/api/posts` : `${API_BASE_URL}/api/market`;
                            const res = await fetch(endpoint, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(it)
                            });
                            const data = await res.json();
                            if (data.success) {
                                if (kind === 'posts') {
                                    state.posts = data.data || state.posts;
                                    localStorage.setItem(globalKey('posts'), JSON.stringify(state.posts));
                                } else {
                                    state.marketItems = data.data || state.marketItems;
                                    localStorage.setItem(globalKey('market'), JSON.stringify(state.marketItems));
                                }
                            } else {
                                kept.push(it);
                            }
                        }
                    } catch (e) {
                        kept.push(it);
                    }
                }
                localStorage.setItem(key, JSON.stringify(kept));
            }
        }

        async function submitPollVote(pollId, choiceId) {
            const voterId = getUserId();
            if (!voterId || voterId === 'guest') { alert('Devi essere loggato per votare'); return; }

            const poll = state.polls.find(p => p.id === pollId);
            if (poll) {
                const prev = poll.voters ? poll.voters[voterId] : null;
                if (prev === choiceId) return;
                poll.voters = poll.voters || {};
                poll.voters[voterId] = choiceId;
                poll.choices = poll.choices.map(c => {
                    if (c.id === choiceId) return { ...c, votes: (c.votes || 0) + 1 };
                    if (prev && c.id === prev) return { ...c, votes: Math.max(0, (c.votes || 0) - 1) };
                    return c;
                });
                render();
            }

            try {
                const res = await fetch(`${API_BASE_URL}/api/polls/${encodeURIComponent(pollId)}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voterId, choiceId })
                });
                const data = await res.json();
                if (data.success) {
                    const idx = state.polls.findIndex(p => p.id === pollId);
                    if (idx > -1) state.polls[idx] = data.data;
                    localStorage.setItem(globalKey('polls'), JSON.stringify(state.polls));
                    render();
                }
            } catch (e) {
                console.error("submitPollVote error:", e);
            }
        }

        async function performSync(sessionData) {
            if (state.syncing) return;
            state.syncing = true;
            render();

            // ⭐ Fetch Global Data (Feed & Market)
            await Promise.all([fetchFeed(), fetchMarket()]);

            // ⭐ Usa la sessione passata o carica quella salvata (come nel codice vecchio)
            if (!sessionData) sessionData = sessionManager.load();
            if (!sessionData) {
                console.warn("⚠️ Nessuna sessione disponibile per sync");
                state.syncing = false;
                render();
                return;
            }

            try {
                console.log("📤 Invio richiesta sync con sessione salvata");

                const response = await fetch(`${API_BASE_URL}/sync`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(sessionData)
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status}`);
                }

                const data = await response.json();
                console.log("📥 Dati ricevuti dal server:", {
                    success: data.success,
                    tasksCount: data.tasks?.length || 0,
                    votiCount: data.voti?.length || 0,
                    promemoriaCount: data.promemoria?.length || data.announcements?.length || 0,
                    plannerReceived: !!data.planner,
                    error: data.error
                });

                if (data.success && data.tasks) {
                    // ⭐ Gestione compiti
                    if (data.tasks.length === 0 && state.tasks.length > 0) {
                        console.warn("⚠️ Il server ha mandato 0 compiti. Mantengo quelli locali per sicurezza.");
                        state.isOffline = false;
                        updateOfflineBadge();
                        render();
                        state.syncing = false;
                        return;
                    }
                    updateTasks(data.tasks, true);

                    // ⭐ CRITICO: Aggiorna voti e salva SEMPRE
                    if (data.voti !== undefined) {
                        state.voti = Array.isArray(data.voti) ? data.voti : [];
                        localStorage.setItem(lsKey('voti'), JSON.stringify(state.voti));
                    }

                    // ⭐ CRITICO: Aggiorna promemoria e salva SEMPRE
                    const promemoriaData = data.promemoria || data.announcements;
                    if (promemoriaData !== undefined) {
                        state.promemoria = Array.isArray(promemoriaData) ? promemoriaData : [];
                        localStorage.setItem(lsKey('promemoria'), JSON.stringify(state.promemoria));
                    }

                    // ✅ FIX PLANNER: Merge intelligente con locale
                    if (data.planner) {
                        const remotePT = data.planner.plannedTasks || {};
                        const remoteSL = data.planner.stressLevels || {};
                        const remoteUpdatedAt = data.planner.updatedAt || null;

                        const localPT = state.plannedTasks || {};
                        const localSL = state.stressLevels || {};
                        const localUpdatedAt = localStorage.getItem(lsKey('planner_updated_at')) || null;

                        const remoteHasData = Object.keys(remotePT).length > 0;
                        const localHasData = Object.keys(localPT).length > 0;

                        const remoteIsNewer = remoteUpdatedAt && (!localUpdatedAt ||
                            new Date(remoteUpdatedAt).getTime() > new Date(localUpdatedAt).getTime());

                        console.log("📊 Planner merge:", { remoteHasData, localHasData, remoteIsNewer });

                        if (remoteIsNewer && remoteHasData) {
                            // Server più recente → usa server
                            state.plannedTasks = remotePT;
                            state.stressLevels = remoteSL;
                            localStorage.setItem(lsKey('planned_tasks'), JSON.stringify(state.plannedTasks));
                            localStorage.setItem(lsKey('stress_levels'), JSON.stringify(state.stressLevels));
                            if (remoteUpdatedAt) localStorage.setItem(lsKey('planner_updated_at'), remoteUpdatedAt);
                            console.log("✅ Planner: usati dati server (più recenti)");
                        } else if (localHasData && !remoteHasData) {
                            // Locale ha dati, server vuoto → push verso server
                            console.log("📤 Planner: locale ha dati, server vuoto → sync verso server");
                            debouncedSavePlannerRemote(100);
                        } else if (localHasData) {
                            // Entrambi hanno dati, locale più recente → mantieni locale
                            console.log("✅ Planner: mantengo dati locali (più recenti)");
                        }

                        notifyPlannerChanged();
                    }

                    state.lastSync = new Date().toLocaleTimeString();
                    state.isOffline = false;
                    state.didup.connected = true;
                    updateOfflineBadge();
                    render();
                } else {
                    throw new Error("Sessione non valida");
                }
            } catch (e) {
                console.error("⚠️ Errore Sync:", e);

                if (String(e?.message || "").includes("Sessione non valida")) {
                    if (sessionData && sessionData.storedUser && sessionData.storedPass) {
                        await performSilentLogin(sessionData.schoolCode, sessionData.storedUser, sessionData.storedPass);
                    } else {
                        state.isOffline = true;
                        state.didup.connected = false;
                        updateOfflineBadge && updateOfflineBadge();
                    }
                } else {
                    state.isOffline = true;
                    updateOfflineBadge && updateOfflineBadge();
                }
            } finally {
                state.syncing = false;
                hideBoot && hideBoot();
                render && render();
            }
        }

        async function performSilentLogin(school, encodedUser, encodedPass) {
            try {
                const user = decodeURIComponent(escape(atob(encodedUser)));
                const pass = decodeURIComponent(escape(atob(encodedPass)));

                console.log("🔐 Silent Login in corso...");

                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ schoolCode: school, username: user, password: pass })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();

                if (data.success) {
                    console.log("✅ Silent Login riuscito!");
                    const newSession = {
                        ...data.session,
                        storedUser: encodedUser,
                        storedPass: encodedPass,
                        schoolCode: school
                    };
                    sessionManager.save(newSession);

                    if (data.tasks) updateTasks(data.tasks, true);
                    if (data.voti !== undefined) {
                        state.voti = Array.isArray(data.voti) ? data.voti : [];
                        localStorage.setItem(lsKey('voti'), JSON.stringify(state.voti));
                    }
                    const promemoriaData = data.promemoria || data.announcements;
                    if (promemoriaData !== undefined) {
                        state.promemoria = Array.isArray(promemoriaData) ? promemoriaData : [];
                        localStorage.setItem(lsKey('promemoria'), JSON.stringify(state.promemoria));
                    }

                    if (data.student) {
                        state.user = data.student;
                        localStorage.setItem(lsKey('user'), JSON.stringify(state.user));
                    }

                    state.isOffline = false;
                    state.didup.connected = true;
                    state.lastSync = new Date().toLocaleTimeString();
                    updateOfflineBadge();
                    render();
                } else {
                    throw new Error(data.error || "Silent login fallito");
                }
            } catch (e) {
                console.error("❌ Silent login errore:", e);
                state.isOffline = true;
                updateOfflineBadge();
            }
        }

        let saveTasksTimeout = null;

        function saveTasks() {
            if (!sessionManager.isLoggedIn() || !sessionManager.load()) {
                console.warn("🔒 skip saveTasks: non loggato (evito scritture guest)");
                return;
            }

            if (saveTasksTimeout) {
                clearTimeout(saveTasksTimeout);
            }

            saveTasksTimeout = setTimeout(() => {
                try {
                    const tasksToSave = (state.tasks || []).map(t => ({
                        id: t.id,
                        text: t.text,
                        subject: t.subject,
                        due_date: t.due_date,
                        display_date: t.display_date,
                        hasValidDate: t.hasValidDate,
                        done: !!t.done
                    }));

                    const prevRaw = localStorage.getItem(lsKey('tasks'));
                    const prev = prevRaw ? JSON.parse(prevRaw) : null;
                    const prevCount = Array.isArray(prev) ? prev.length : 0;

                    if (tasksToSave.length === 0 && prevCount > 0) {
                        console.warn("🛑 Anti-wipe: blocco salvataggio vuoto (cache aveva", prevCount, "tasks)");
                        localStorage.setItem(lsKey('planned_tasks'), JSON.stringify(state.plannedTasks || {}));
                        localStorage.setItem(lsKey('stress_levels'), JSON.stringify(state.stressLevels || {}));

                    console.log("💾 Salvato profilo:", tasksToSave.length, "tasks");
                } catch (e) {
                    console.error("❌ Errore salvataggio:", e);
                }
            }, 150);
        }


        function updateTasks(newTasks, shouldRender = false) {
            if (!newTasks) return;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // ⭐ Recupera stato 'done' persistido
            const localTasks = JSON.parse(localStorage.getItem(lsKey('tasks')) || '[]');

            // Pre-index locale per “match” (subject + text + due_date)
            const localIndex = new Map();
            for (const lt of localTasks) {
                const key = `${(lt.subject || '').toLowerCase()}||${(lt.text || '').toLowerCase()}||${lt.due_date || ''}`;
                localIndex.set(key, lt);
            }

            // Costruisci nuovi task formattati con ID STABILI
            const formatted = newTasks.map(t => {
                const rawDate = t.datCompito || t.due_date || t.dataProva || t.datGiorno || t.date;
                const dateObj = parseArgoDate(rawDate);
                const isoDate = !isNaN(dateObj.getTime()) ? dateObj.toISOString().split('T')[0] : '';

                const text = t.text || t.desCompito || "Nessuna descrizione";
                const subject = t.subject || t.materia || 'Generico';

                // match locale per preservare done
                const key = `${subject.toLowerCase()}||${text.toLowerCase()}||${isoDate}`;
                const match = localIndex.get(key);

                // ID stabile
                const id = t.id || stableTaskId({ subject, text, due_date: isoDate });

                return {
                    id,
                    text,
                    subject,
                    due_date: isoDate,
                    display_date: rawDate,
                    dateObj,
                    hasValidDate: !isNaN(dateObj.getTime()) && dateObj.getTime() > 0,
                    done: match ? !!match.done : !!t.done
                };
            });

            // Filtra e ordina
            const nextTasks = formatted
                .filter(t => t.hasValidDate && t.dateObj >= today)
                .sort((a, b) => a.dateObj - b.dateObj);

            // Migrazione plannedTasks: mappa oldId -> newId usando la stessa chiave
            const newIndexByKey = new Map();
            for (const nt of nextTasks) {
                const key = `${nt.subject.toLowerCase()}||${nt.text.toLowerCase()}||${nt.due_date}`;
                newIndexByKey.set(key, nt.id);
            }
            const idMapping = new Map();
            for (const lt of localTasks) {
                const key = `${(lt.subject || '').toLowerCase()}||${(lt.text || '').toLowerCase()}||${lt.due_date || ''}`;
                const newId = newIndexByKey.get(key);
                if (newId && lt.id && lt.id !== newId) {
                    idMapping.set(lt.id, newId);
                }
            }

            // Applica migrazione agli plannedTasks senza perdere niente
            const migratedPlanned = {};
            for (const [dateStr, ids] of Object.entries(state.plannedTasks || {})) {
                const migratedIds = Array.from(new Set(ids.map(id => idMapping.get(id) || id)));
                migratedPlanned[dateStr] = migratedIds;
            }

            state.tasks = nextTasks;
            state.plannedTasks = migratedPlanned;

            saveTasks();
            if (shouldRender) render();
        }

        // ✅ Normalizza classe mantenendo l'indirizzo
        function normalizeClassUi(cls) {
            if (!cls) return null;
            const txt = String(cls).toUpperCase().trim();

            // Estrai numero + sezione base (es. "5E")
            const baseMatch = txt.match(/\b([1-5])\s*([A-Z]{1,2})\b/);
            if (!baseMatch) return null;

            const base = baseMatch[1] + baseMatch[2]; // "5E"

            // Estrai indirizzo se presente (es. "SA", "SU", "LS")
            const indirizzoMatch = txt.match(/\(([A-Z]{2,4})\)|\b(SA|SU|LS|LC|LL|LA|LM|AFM|ITI|CAT)\b/i);
            const indirizzo = indirizzoMatch ? (indirizzoMatch[1] || indirizzoMatch[2]).toUpperCase() : null;

            return indirizzo ? `${base} ${indirizzo}` : base; // "5E SA" o "5E"
        }

        // ✅ Validazione più permissiva
        function isValidClass(cls) {
            if (!cls) return false;
            const txt = String(cls).toUpperCase().trim();
            // Accetta: "5E", "5E SA", "5E (SA)", "3ASU", etc.
            return /^[1-5][A-Z]{1,3}(\s*\(?[A-Z]{2,4}\)?)?$/.test(txt.replace(/\s+/g, ' '));
        }

        function isValidName(name) {
            if (!name || typeof name !== 'string') return false;
            const trimmed = name.trim();
            if (trimmed.length < 2) return false;
            return /^[a-zA-ZÀ-ÿ0-9\s'.\-]+$/.test(trimmed);
        }

            const d = today.getDay(); // 0=Sun, 1=Mon...

            // Crea una vista dayGrid di 2 settimane
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridTwoWeeks',
                views: {
                    dayGridTwoWeeks: {
                        type: 'dayGrid',
                        duration: { weeks: 2 }
                    }

                locale: 'it',
                themeSystem: 'standard',
                firstDay: 1, // Lunedì

                validRange: { start: today.toISOString().split('T')[0] },

        // Aggiorna rapidamente tutti gli eventi senza ricreare il calendario
        function syncCalendarEvents(calendar) {
            if (!calendar) return;
            const evts = buildCalendarEventsFromState();
            calendar.batchRendering(() => {
                calendar.removeAllEvents();
                evts.forEach(e => calendar.addEvent(e));
            });
        }

        /* === 2) Aggiorna SOLO la sezione “Agenda della settimana” nel Planner === */
        function updateWeeklyAgendaView() {
            if (state.view !== 'planner') return;
            const el = document.getElementById('weekly-agenda-list');
            if (!el) return;

            const plannedWithDates = [];
            Object.entries(state.plannedTasks || {}).forEach(([dateStr, taskIds]) => {
                taskIds.forEach(id => {
                    const task = state.tasks.find(t => t.id === id);
                    if (task) plannedWithDates.push({ ...task, plannedDate: dateStr });
                });
            });

            plannedWithDates.sort((a, b) => new Date(a.plannedDate) - new Date(b.plannedDate));

            // Filtra solo date da oggi in poi (non mostrare compiti passati)
            const filtered = plannedWithDates.filter(t => isFutureOrToday(t.plannedDate));

            const dayNamesShort = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
            const html = filtered.length > 0
                ? filtered.map(t => {
                    const d = new Date(t.plannedDate);
                    const dayLabel = `${dayNamesShort[d.getDay()]} ${d.getDate()}`;
                    const subjectColor = getSubjectColor(t.subject);
                    return `
                                <div class="glass-list-item" style="display:flex; align-items:center; gap:12px; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:8px;">
                                    <div style="min-width:50px; font-size:11px; font-weight:800; color: var(--orange); text-transform: uppercase;">${dayLabel}</div>
                                    <div 
                                        class="task-checkbox ${t.done ? 'checked' : ''}"
                                        data-task-toggle="${t.id}"
                                        onclick="toggleTask('${t.id}')" 
                                        style="width:20px; height:20px; border:2px solid ${t.done ? 'var(--green)' : subjectColor}; background:${t.done ? 'var(--green)' : 'transparent'}; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;">
                                        ${t.done ? '<i class="ph-bold ph-check" style="font-size:12px; color:black;"></i>' : ''}
                                    </div>
                                    <div style="flex:1; min-width:0;">
                                        <div data-task-text="${t.id}" style="font-size:14px; color:white; font-weight:500; ${t.done ? 'text-decoration: line-through; opacity: 0.5;' : ''}">
                                            ${t.text}
                                        </div>
                                        <div style="font-size:10px; color:${subjectColor}; font-weight:700; text-transform:uppercase;">${t.subject}</div>
                                    </div>
                                </div>
                            `;
                }).join('')
                : `<div style="text-align:center; opacity:0.5; font-size:13px; padding:10px;">Nessun compito pianificato.</div>`;

            el.style.opacity = '0';
            el.style.transition = 'opacity 0.15s ease-out';
            setTimeout(() => {
                el.innerHTML = html;
                el.style.opacity = '1';
            }, 100);
        }

        /* === 3) Notifica centralizzata per aggiornare tutto in tempo reale === */
        function notifyPlannerChanged() {
            // badge sul bottone Organizza Oggi e Dashboard
            if (typeof updatePlannerCounter === 'function') updatePlannerCounter();

            const calendarEl = document.getElementById('calendar');

        async function logout() {
            if (confirm('Sei sicuro di voler disconnettere? I tuoi planner e feed saranno mantenuti.')) {

                // ✅ STEP 1: Salva userId PRIMA di clear
                const currentUserId = getUserId();
                const currentLsPrefix = getActiveProfileKey();

                if (currentUserId && currentUserId !== 'guest') {
                    console.log("💾 Salvataggio planner pre-logout per:", currentUserId);

                    // ✅ Salva in localStorage con chiave corrente PRIMA di clear
                    localStorage.setItem(`${currentLsPrefix}:planned_tasks`, JSON.stringify(state.plannedTasks || {}));
                    localStorage.setItem(`${currentLsPrefix}:stress_levels`, JSON.stringify(state.stressLevels || {}));
                    localStorage.setItem(`${currentLsPrefix}:planner_updated_at`, new Date().toISOString());

                    // ✅ Forza salvataggio sincrono su Supabase
                    try {
                        const payload = {
                            plannedTasks: state.plannedTasks || {},
                            stressLevels: state.stressLevels || {},
                            plannedDetails: {},
                            updatedAt: new Date().toISOString()
                        };

                        const response = await fetch(`${API_BASE_URL}/api/planner/${encodeURIComponent(currentUserId)}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            console.log("✅ Planner salvato su Supabase pre-logout");
                        } else {
                            console.warn("⚠️ Errore salvataggio pre-logout:", await response.text());
                        }
                    } catch (e) {
                        console.warn("⚠️ Errore salvataggio pre-logout:", e);
                    }
                }

                // ✅ STEP 2: Ora cancella sessione
                sessionManager.clear();

                // ✅ STEP 3: Reset state MA NON cancellare plannedTasks/stressLevels
                state.isLoggedIn = false;
                state.didup.connected = false;
                state.user = { name: '', class: '' };
                state.tasks = [];
                state.voti = [];
                state.promemoria = [];
                state.isOffline = false;
                state.lastSync = null;

                // ✅ RESETTA PLANNER per il prossimo utente
                state.plannedTasks = {};
                state.stressLevels = {};

                state.view = 'login';
                if (_threadsPoller) clearInterval(_threadsPoller);
                render();
                console.log('✅ Logout completato - Planner preservato su Supabase e localStorage');
            }
        }

        function getSubjectColor(subject) {
            const s = (subject || '').toLowerCase();
            if (s.includes('ita')) return '#FF3B30'; // Red
            if (s.includes('mat')) return '#007AFF'; // Blue
            if (s.includes('ing')) return '#5856D6'; // Indigo
            if (s.includes('storia') || s.includes('geo')) return '#FF9500'; // Orange
            if (s.includes('scienza') || s.includes('biol')) return '#34C759'; // Green
            if (s.includes('fisica')) return '#AF52DE'; // Purple
            if (s.includes('arte')) return '#FF2D55'; // Pink
            if (s.includes('ed')) return '#5AC8FA'; // Light Blue
            if (s.includes('rel')) return '#FFCC00'; // Yellow
            return '#60a5fa'; // Default fallback color
        }

        function renderAvatar(displayName, size = 44, avatarUrl = null) {
            // Priorità: avatarUrl param > state.user.avatar se stesso utente

            if (img && img.startsWith('http')) {

        async function uploadAvatar(base64Image) {
            try {
                const userId = getUserId();
                const response = await fetch(`${API_BASE_URL}/api/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image, userId: userId })
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Upload fallito');
                console.log('✅ Avatar uploaded:', data.url);
                return data.url;
            } catch (error) {
                console.error('❌ Upload avatar failed:', error);
                throw error;
            }
        }

        async function saveProfileToServer(profileData) {
            try {
                const userId = getUserId();
                const response = await fetch(`${API_BASE_URL}/api/profile`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        name: profileData.name || state.user.name,
                        class: profileData.class || state.user.class,
                        specialization: profileData.specialization || state.user.specialization,
                        avatar: profileData.avatar
                    })
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.error || 'Salvataggio profilo fallito');
                console.log('✅ Profile saved to Supabase');
                return data;
            } catch (error) {
                console.error('❌ Save profile failed:', error);
                throw error;
            }
        }

        async function loadProfileFromServer() {
            try {
                const userId = getUserId();
                if (!userId || userId === 'guest') return null;

                const response = await fetch(`${API_BASE_URL}/api/profile/${encodeURIComponent(userId)}`);
                const data = await response.json();

                if (data.success && data.data) {
                    const profile = data.data;
                    console.log("📥 Profilo Supabase ricevuto:", profile);

                    // ✅ Merge intelligente (Bug #6)
                    if (profile.avatar && profile.avatar.startsWith('http')) {
                        state.user.avatar = profile.avatar;
                        console.log('✅ Avatar loaded from DB:', profile.avatar);
                    }

                    // Aggiorna nome SOLO se locale non valido e remoto è valido
                    if (!isValidName(state.user.name) && profile.name && isValidName(profile.name)) {
                        state.user.name = profile.name;
                        console.log("✅ Nome aggiornato da Supabase:", profile.name);
                    }

                    // Aggiorna classe SOLO se locale non valida e remota è valida
                    if (!isValidClass(state.user.class) && profile.class && isValidClass(profile.class)) {
                        state.user.class = profile.class;
                        console.log("✅ Classe aggiornata da Supabase:", profile.class);
                    }

                    localStorage.setItem(lsKey('user'), JSON.stringify(state.user));
                    return profile;
                }
                return null;
            } catch (error) {
                console.warn('⚠️ Load profile failed (non-fatal):', error.message);
                return null;
            }
        }

        async function handleAvatarUpload(event) {
            const file = event.target?.files?.[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('Seleziona un\'immagine valida');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('Immagine troppo grande. Max 5MB');
                return;
            }

            try {
                showBoot("Caricamento avatar...");

                const base64Image = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                const avatarUrl = await uploadAvatar(base64Image);
                await saveProfileToServer({ avatar: avatarUrl });

                state.user.avatar = avatarUrl;
                localStorage.setItem(lsKey('user'), JSON.stringify(state.user));

                // Se la modale di modifica profilo è aperta, aggiorna la preview
                const modalAvatarPreview = document.querySelector('#edit-profile-avatar-preview');
                if (modalAvatarPreview) {
                    modalAvatarPreview.innerHTML = renderAvatar(state.user.name, 100);
                }

                render();
                hideBoot();
                // alert('✅ Avatar aggiornato!'); // Rimosso per fluidità se dentro modale

            } catch (error) {
                hideBoot();
                console.error('❌ Avatar update failed:', error);
                alert('❌ Errore: ' + error.message);
            }
        }

                                    <div style="flex:1; min-width:0;">

                    </div>
                    <div class="circolari-row">
                        ${state.news.map(n => `
