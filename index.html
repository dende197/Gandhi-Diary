    <style>
        /* Essential inline styles only */
        html, body { background-color: #F6F5F3; }
        @media (prefers-color-scheme: dark) { html, body { background-color: #0D1117; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app-loader { position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-body);z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity 0.22s ease-out; }
        .app-loader-ring{
            width:42px;height:42px;border-radius:50%;
            background:conic-gradient(from 0deg, #0D1F2D 0%, #1A6B8A 45%, #C6F2DF 100%);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
            animation:spin 0.85s cubic-bezier(.4,0,.2,1) infinite;
            margin:0 auto 20px;
        }
    </style>
</head>

<body style="margin:0; padding:0; overflow-x:hidden;">

    <!-- APP LOADER -->
    <div id="app-loader">
        <div style="text-align:center; transform:translateY(-20px);">
            <div class="app-loader-ring"></div>
            <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:3px;text-transform:uppercase;"></div>
        </div>
    </div>

    <!-- BOOT OVERLAY (Hydration) -->
    <div id="boot-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-body);z-index:99998;display:none;align-items:center;justify-content:center;transition:opacity 0.3s ease-out;">
        <div style="text-align:center;">
             <h2 style="font-size:22px; font-weight:700; color:#fff; margin-bottom:8px; letter-spacing:-0.5px;"></h2>
             <p id="boot-status" style="font-size:12px; color:rgba(255,255,255,0.4);">Sincronizzazione scadenze...</p>
        </div>
    </div>



    <div id="nav-container"></div>
    <div class="main-container">
        <div id="app"></div>
    </div>

    <div id="modals"></div>
    <div id="toasts"></div>

    <script src="app-bootstrap.js?v=3.3.8"></script>
</body>
