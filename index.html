<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>G-Diary</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Urbanist:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- External Assets -->
    <link rel="stylesheet" href="dashboard-v6.css?v=2.9.0">
    <link rel="stylesheet" href="style.css?v=2.9.0">
    <link rel="stylesheet" href="animations.css?v=2.9.0">
    <link rel="stylesheet" href="patch-finale.css">
    <link rel="stylesheet" href="nav-transition.css">
    
    <!-- External Logic Modules -->
    <script src="animations.js?v=2.9.0" defer></script>
    <script src="ui.js?v=2.9.0" defer></script>
    <script src="fluidity-engine-v3.js?v=3.0.0" defer></script>

    <style>
        /* Minimal inline overrides only */
        :root { --accent: #8B5CF6; --bg-body: #0A0A0B; --text: #FFFFFF; --text-dim: rgba(255,255,255,0.4); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body style="margin:0; padding:0; background:var(--bg-body);">

    <!-- PREMIUM LOADER -->
    <div id="app-loader" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-body);z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s ease-out;">
        <div style="text-align:center;">
            <div style="width:44px;height:44px;border:3px solid rgba(0,0,0,0.06);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;"></div>
            <div style="font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;">G-CONNECT</div>
        </div>
    </div>

    <!-- BOOT OVERLAY -->
    <div id="boot-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-body);z-index:99998;display:none;align-items:center;justify-content:center;transition:opacity 0.3s ease-out;">
        <div style="text-align:center;">
             <h2 class="boot-title" style="font-size:18px; color:var(--text); margin-bottom:10px;">G-Connect</h2>
             <p style="font-size:12px; color:var(--text-dim);">Ripristino sessione...</p>
        </div>
    </div>

    <div id="offline-badge" class="offline-badge">
        <i class="ph ph-warning-circle"></i> Disconnesso
        <button onclick="performSync().catch(()=>{})" style="margin-left:8px; background: var(--orange); color: black; border: none; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer;">RIPROVA</button>
    </div>

    <div id="nav-container"></div>
    <div class="main-container">
        <div id="app"></div>
    </div>

    <div id="custom-scrollbar"><div id="scroll-thumb"></div></div>
    <div id="modals"></div>
    <div id="toasts"></div>

    <script>
        // --- G-CONNECT SYSTEM CORE (v3.0) ---
        const APP_VERSION = '2.9.0';
        const IS_LOCAL = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const API_BASE_URL = IS_LOCAL ? "http://localhost:5001" : "https://g-connect-backend-r5j1.vercel.app";
        window.API_BASE_URL = API_BASE_URL;

        const SUPABASE_URL = "https://mlcutgkfunbpmrnbeznd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sY3V0Z2tmdW5icG1ybmJlem5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkxOTg2NDgsImV4cCI6MjA4NDc3NDY0OH0.eWR7PxNsJjSGAM1WoaNseVkeQDpEqaUvO8xvXoDKLQg";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let DIRECTORY = [
            { name: 'Alessandro Russo', id: 'demo:alessandro:0', class: '5B', status: 'online' },
            { name: 'Sofia Bianchi', id: 'demo:sofia:0', class: '3A', status: 'offline' },
            { name: 'Luca Esposito', id: 'demo:luca:0', class: '4C', status: 'online' },
            { name: 'Giulia Conti', id: 'demo:giulia:0', class: '5B', status: 'offline' },
            { name: 'Matteo Ferri', id: 'demo:matteo:0', class: '2A', status: 'online' },
            { name: 'Chiara Romano', id: 'demo:chiara:0', class: '1B', status: 'offline' },
            { name: 'Proff. Esposito', id: 'demo:esposito:docente', class: 'Docente', status: 'online' }
        ];

        // 🛡️ SESSION MANAGER
        const sessionManager = {
            save(sessionData) {
                try {
                    const existing = this.load() || {};
                    const merged = { ...existing };
                    for (const [key, value] of Object.entries(sessionData)) {
                        if (value !== null && value !== undefined) merged[key] = value;
                    }
                    localStorage.setItem('argo_session', JSON.stringify(merged));
                    localStorage.setItem('argo_is_logged_in', 'true');
                } catch (e) { console.error("Session save error", e); }
            },
            load() {
                try {
                    const saved = localStorage.getItem('argo_session');
                    return saved ? JSON.parse(saved) : null;
                } catch (e) { return null; }
            },
            isLoggedIn() { return localStorage.getItem('argo_is_logged_in') === 'true'; },
            clear() {
                localStorage.removeItem('argo_session');
                localStorage.removeItem('argo_is_logged_in');
                localStorage.removeItem('argo_password');
            }
        };

        function getActiveProfileKey() {
            const s = sessionManager.load();
            if (!s || !sessionManager.isLoggedIn()) return 'guest';
            return `p:${s.schoolCode || 'noschool'}:${(s.userName || s.username || 'nouser').toLowerCase()}:${s.profileIndex ?? 0}`;
        }
        function lsKey(key) { return `${getActiveProfileKey()}:${key}`; }

        function generatePid(school, user, index) {
            return `p:${school}:${user}:${index ?? 0}`.toLowerCase().replace(/\s+/g, '');
        }
        function getUserId() {
            const session = sessionManager.load();
            if (session && session.studentId) return session.studentId;
            return 'guest';
        }

        // --- STATE ENGINE ---
        const state = {
            view: 'login',
            user: { id: null, name: 'Utente', class: 'N/D' },
            isLoggedIn: false,
            isOffline: false,
            syncing: false,
            booting: true,
            tasks: [],
            voti: [],
            promemoria: [],
            plannedTasks: {},
            stressLevels: {},
            stressVents: {},
            prepLevels: {},
            circolari: [],
            messages: {},
            threads: []
        };

        // --- GLOBAL SYNC ---
        async function performSync(sessionData) {
            if (state.syncing) return;
            state.syncing = true;
            if (!sessionData) sessionData = sessionManager.load();
            if (!sessionData) { state.syncing = false; return; }

            try {
                const response = await fetch(`${API_BASE_URL}/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(sessionData)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data.success) {
                    if (data.tasks) state.tasks = data.tasks;
                    if (data.voti) state.voti = data.voti;
                    if (data.planner) {
                        state.plannedTasks = data.planner.plannedTasks || {};
                        state.stressLevels = data.planner.stressLevels || {};
                        state.stressVents = data.planner.stressVents || {};
                        state.prepLevels = data.planner.prepLevels || {};
                    }
                    localStorage.setItem(lsKey('tasks'), JSON.stringify(state.tasks));
                    localStorage.setItem(lsKey('voti'), JSON.stringify(state.voti));
                    state.isOffline = false;
                }
            } catch (e) {
                console.error("Sync error:", e);
                state.isOffline = true;
            } finally {
                state.syncing = false;
                if (typeof window.scheduleRender === 'function') window.scheduleRender();
            }
        }

        async function savePlannerRemote() {
            const userId = getUserId();
            if (!userId || userId === 'guest') return;
            const payload = {
                plannedTasks: state.plannedTasks,
                stressLevels: state.stressLevels,
                stressVents: state.stressVents,
                tasks: state.tasks,
                updatedAt: new Date().toISOString()
            };
            try {
                await fetch(`${API_BASE_URL}/api/planner/${encodeURIComponent(userId)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.warn("Cloud save failed", e); }
        }

        // --- NAVIGATION ---
        function currentViewFromHash() {
            const v = (location.hash || '').replace('#', '').trim();
            const allowed = ['home', 'planner', 'voti', 'ai_assistant', 'academic_profile', 'profile', 'mental_health'];
            return allowed.includes(v) ? v : null;
        }

        window.addEventListener('hashchange', () => {
            const v = currentViewFromHash();
            if (v && state.view !== v) {
                state.view = v;
                if (typeof window.render === 'function') window.render();
            }
        });

        // --- BOOT ---
        document.addEventListener('DOMContentLoaded', async () => {
            const argoSession = sessionManager.load();
            if (argoSession && sessionManager.isLoggedIn()) {
                state.isLoggedIn = true;
                state.user.id = argoSession.studentId;
                state.view = currentViewFromHash() || 'home';
                
                // Hydrate from localStorage for instant display
                try {
                    state.tasks = JSON.parse(localStorage.getItem(lsKey('tasks'))) || [];
                    state.voti = JSON.parse(localStorage.getItem(lsKey('voti'))) || [];
                } catch(e) {}
                
                await performSync(argoSession);
            } else {
                state.view = 'login';
            }
            state.booting = false;
            
            // Initial trigger
            if (typeof window.render === 'function') window.render();
            
            // Remove Loader
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 400);
            }
        });

        // Global APIs for ui.js
        window.navigate = (v) => { location.hash = v; };
        window.logout = () => { sessionManager.clear(); location.reload(); };
        window.performSync = performSync;
        window.saveTasks = () => localStorage.setItem(lsKey('tasks'), JSON.stringify(state.tasks));

    </script>
</body>
</html>
