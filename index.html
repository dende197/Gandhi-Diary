                                <div>
                                    <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
                                        <i class="ph-fill ph-file-pdf" style="color:#ef4444; font-size:16px;"></i>
                                        <span style="color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 800; text-transform: uppercase;">CIRCOLARE</span>
                                    </div>
                                    <h3 style="margin: 0; font-size: 16px; line-height: 1.3; font-weight: 700; color: white; text-align: left;">${n.title}</h3>
                                </div>
                                <span style="font-size: 12px; color: #60a5fa; font-weight: 700;">Apri documento <i class="ph-bold ph-arrow-up-right" style="font-size:10px;"></i></span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderCirculars() {
            const news = [
                { id: 128, title: "Circolare n. 128 - Assemblea d'Istituto 7 Febbraio", url: "https://www.liceogandhi.edu.it/categoria/storico-circolari/" },
                { id: 127, title: "Circolare n. 127 - Variazione Calendario Scrutini", url: "https://www.liceogandhi.edu.it/categoria/storico-circolari/" },
                { id: 126, title: "Circolare n. 126 - Saldo viaggio d'istruzione", url: "https://www.liceogandhi.edu.it/categoria/storico-circolari/" },
            ];
            return news.map(n => `
                <div onclick="window.open('${n.url}','_blank')" class="card" style="min-width: 260px; height: 150px; padding: 18px; display:flex; flex-direction:column; justify-content:space-between; cursor:pointer; margin-bottom:0;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="ph-fill ph-file-pdf" style="color: var(--red); font-size:18px;"></i>
                        <span style="color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 700; text-transform: uppercase;">CIRCOLARE</span>
                    </div>
                    <div style="font-size: 16px; font-weight: 700; line-height: 1.3; color:white; text-align:left;">${n.title}</div>
                    <div style="font-size: 12px; color: var(--blue); font-weight: 700;">Apri documento <i class="ph-bold ph-arrow-up-right" style="font-size:10px;"></i></div>
                </div>`).join('');
        }

        function renderTodayPlannerWidget() {
            const todayStr = new Date().toISOString().split('T')[0];
            const plannedIds = state.plannedTasks[todayStr] || [];
            const plannedTasks = state.tasks.filter(t => plannedIds.includes(t.id));
            if (!plannedTasks.length) return '<div style="text-align:center; opacity:0.6; font-size:13px; color:white; padding: 12px;">Nessun compito pianificato.</div>';
            return plannedTasks.map(t => {
                const subjectColor = getSubjectColor(t.subject);
                return `
                <div style="display:flex; align-items:center; gap:12px; padding:10px; background: rgba(255,255,255,0.05); border-radius: 12px; border-left: 3px solid ${subjectColor}; margin-bottom: 8px;">
                    <div style="flex:1; min-width:0;">
                        <div style="font-weight:600; font-size:13px; color:white; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.text}</div>
                        <div style="font-size:10px; color:${subjectColor}; font-weight:700; text-transform:uppercase; text-align:left;">${t.subject}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderMarket() {
            const items = [...state.marketItems];
            const pinned = items.filter(i => i.pinned);
            const normal = items.filter(i => !i.pinned);
            const list = [...pinned, ...normal];

            return `
            <div class="view page-bg">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                    <h1>Market</h1>
                    <button onclick="openNewItemModal()" style="background:var(--green); color:black; padding:8px 16px; border-radius:20px; border:none; font-weight:800; cursor:pointer;">+ Vendi</button>
                </div>
                <div class="market-grid">
                    ${list.map(renderMarketCard).join('')}
                </div>
            </div>`;
        }

        function renderMarketCard(item) {
            const statusClass = item.status || 'available';
            const statusText = statusClass === 'sold' ? 'Venduto' : (statusClass === 'reserved' ? 'Riservato' : 'Disponibile');
            return `
            <div class="market-card" onclick="openMarketItemModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                <div class="market-card-img">
                    ${item.image ? `<img src="${item.image}">` : `<i class="ph ph-image" style="font-size:36px; color:rgba(255,255,255,0.1);"></i>`}
                </div>
                <div class="market-card-body">
                    <div class="market-price">${item.price}</div>
                    <div class="market-title">${item.title}</div>
                    <div style="margin-top:8px;">
                        <span class="market-status ${statusClass}">${statusText}</span>
                    </div>
                </div>
            </div>`;
        }

        function getMarketImages(item) {
            const imgs = Array.isArray(item?.images) ? item.images : (item?.image ? [item.image] : []);
            return imgs.length ? imgs : [];
        }

        function openMarketItemModal(item) {
            state.marketModal = { item, index: 0 };
            renderMarketItemModal();
        }

        function setMarketModalImage(index) {
            const modal = state.marketModal;
            if (!modal) return;
            const images = getMarketImages(modal.item);
            if (!images.length) return;

            modal.index = Math.max(0, Math.min(images.length - 1, index));

            const mainImg = document.getElementById('market-modal-main-img');
            if (mainImg) mainImg.src = images[modal.index];

            document.querySelectorAll('.market-thumb').forEach((el, idx) => {
                el.classList.toggle('active', idx === modal.index);
            });
        }

        function renderMarketItemModal() {
            const modalContainer = getModalContainer();
            const { item, index } = state.marketModal;
            const images = getMarketImages(item);

            modalContainer.innerHTML = `
            <div class="modal-overlay" onclick="closeModal(event)">
                <div class="modal-content glass-panel" onclick="event.stopPropagation()" style="max-width:520px; padding:20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <h2 style="margin:0;">${item.title}</h2>
                        <button onclick="closeModal()" style="background:none; border:none; color:#60a5fa; font-weight:700;">Chiudi</button>
                    </div>

                    <div class="market-modal-img">
                        ${images.length ? `<img id="market-modal-main-img" src="${images[index]}">` : `<i class="ph ph-image" style="font-size:40px; color:rgba(255,255,255,0.2);"></i>`}
                    </div>

                    ${images.length > 1 ? `
                    <div class="market-thumb-row">
                        ${images.map((img, i) => `
                            <div class="market-thumb ${i === index ? 'active' : ''}" onclick="setMarketModalImage(${i})">
                                <img src="${img}">
                            </div>
                        `).join('')}
                    </div>` : ''}

                    <div style="margin-top:14px;">
                        <div style="font-size:18px; font-weight:800; color:var(--green);">${item.price}</div>
                        <div style="font-size:14px; color:rgba(255,255,255,0.75); margin-top:8px;">${item.description || 'Nessuna descrizione disponibile.'}</div>
                    </div>

                    <div style="display:flex; gap:10px; margin-top:16px;">
                        <button onclick="handlePurchase(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="btn-primary" style="flex:1; background: var(--green); color:black;">Acquista</button>
                        <button onclick="handleOffer(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="btn-primary" style="flex:1; background: rgba(255,255,255,0.12); color:white;">Fai Offerta</button>
                    </div>
                </div>
            </div>`;
        }

        function renderSearch() {
            return `
            <div class="view" style="padding-top: 0;">
                <div style="display:flex; align-items:center; gap:10px; margin: 10px 0; padding: 0 12px;">
                     <button onclick="navigate('home')" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;"><i class="ph ph-arrow-left"></i></button>
                     <h1 style="margin:0; text-align:left;">Ricerca Globale</h1>
                </div>
                <div style="position: relative; padding: 0 12px; margin-bottom: 24px;">
                    <i class="ph ph-magnifying-glass" style="position: absolute; left: 26px; top: 12px; color: var(--text-muted); font-size: 20px;"></i>
                    <input id="search-input" type="text" placeholder="Cerca studenti o materie..." oninput="filterContent(this.value)" style="padding-left: 44px; margin-bottom: 0; background:rgba(255,255,255,0.1); border-radius:18px;">
                </div>
                <div id="search-results" style="padding: 0 12px;">
                    <div style="text-align:center; padding: 40px; color: var(--text-muted); opacity:0.6;">
                        <i class="ph ph-sparkle" style="font-size:32px; margin-bottom:12px; display:block;"></i>
                        Inizia a scrivere per cercare...
                    </div>
                </div>
            </div>`;
        }

        function filterContent(q) {
            const list = document.getElementById('search-results');
            if (!list) return;
            if (!q.trim()) {
                list.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted); opacity:0.6;"><i class="ph ph-sparkle" style="font-size:32px; margin-bottom:12px; display:block;"></i>Inizia a scrivere per cercare...</div>`;
                return;
            }

            const query = q.toLowerCase();

            // 1. Filtraggio Studenti
            const filteredUsers = (typeof DIRECTORY !== 'undefined' ? DIRECTORY : []).filter(u =>
                u.name.toLowerCase().includes(query) || (u.class && u.class.toLowerCase().includes(query))
            );

            // 2. Filtraggio Compiti per Materia
            const filteredTasks = (state.tasks || []).filter(t =>
                (t.subject && t.subject.toLowerCase().includes(query)) ||
                (t.text && t.text.toLowerCase().includes(query))
            );

            let html = '';

            // Sezione Compiti/Materie (Priorità richiesta)
            if (filteredTasks.length > 0) {
                html += `<h3 style="margin-bottom: 12px; text-align:left; color:var(--orange); font-size:12px; text-transform:uppercase; letter-spacing:1px;">Compiti e Materie</h3>`;
                html += filteredTasks.map(t => {
                    const color = getSubjectColor(t.subject);
                    return `
                    <div onclick="navigate('planner')" style="display: flex; align-items: center; padding: 14px; background: rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 10px; border-left: 4px solid ${color};">
                        <div style="flex: 1; text-align:left;">
                            <div style="font-weight: 700; font-size: 15px; color:white;">${t.text}</div>
                            <div style="color: ${color}; font-size: 11px; font-weight:800; text-transform:uppercase;">${t.subject}</div>
                        </div>
                        <i class="ph ph-caret-right" style="color:rgba(255,255,255,0.2);"></i>
                    </div>`;
                }).join('');
            }

            // Sezione Persone
            if (filteredUsers.length > 0) {
                html += `<h3 style="margin: 20px 0 12px 0; text-align:left; color:var(--blue); font-size:12px; text-transform:uppercase; letter-spacing:1px;">Persone</h3>`;
                html += filteredUsers.map(u => `
                    <div onclick="openChat('${u.name}', '${u.id}')" style="display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 10px; cursor:pointer;">
                        <div style="position: relative; margin-right: 12px;">
                            ${renderAvatar(u.name, 44)}
                            ${u.status === 'online' ? `<div style="position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; background: var(--green); border: 2px solid black; border-radius: 50%;"></div>` : ''}
                        </div>
                        <div style="flex: 1; text-align:left;">
                            <div style="font-weight: 600; font-size: 15px; color:white;">${u.name}</div>
                            <div style="color: var(--text-muted); font-size: 12px;">Classe ${u.class}</div>
                        </div>
                        <i class="ph ph-chat-circle" style="font-size: 20px; color: var(--blue); opacity:0.8;"></i>
                    </div>
                `).join('');
            }

            if (html === '') {
                html = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">Nessun risultato trovato per "${q}"</div>`;
            }

            list.innerHTML = html;
        }

        function renderFeed() {
            let displayPosts = [...state.posts];

            // Pinned first
            const pinned = displayPosts.filter(p => p.pinned);
            const normal = displayPosts.filter(p => !p.pinned);
            displayPosts = [...pinned, ...normal];

            // Filters
            if (state.feed.classFilter !== 'Tutte') displayPosts = displayPosts.filter(p => p.class === state.feed.classFilter);
            if (state.feed.search) {
                const q = state.feed.search.toLowerCase();
                displayPosts = displayPosts.filter(p => (p.author || '').toLowerCase().includes(q) || p.text.toLowerCase().includes(q));
            }

            const classes = ['Tutte', ...new Set(state.posts.map(p => p.class || '5B'))];

            return `
            <div class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <h1>Feed</h1>
                    <button onclick="openNewPostModal()" style="background:var(--blue); color:white; padding:8px 16px; border-radius: 20px; border:none; font-weight:700; cursor:pointer;">+ Post/Sondaggio</button>
                </div>

                <div style="position:relative; margin-bottom:12px;">
                    <i class="ph ph-magnifying-glass" style="position:absolute; left:12px; top:10px; color: var(--text-muted); font-size:18px;"></i>
                    <input type="text" placeholder="Cerca persone o post..." value="${state.feed.search}" oninput="updateFeedSearch(this.value)" style="padding-left:38px; margin-bottom:0; height:38px;">
                </div>

                <div style="display:flex; gap:8px; overflow-x:auto; margin-bottom: 20px; padding-bottom:6px; scrollbar-width:none;">
                    ${classes.map(c => `
                        <button onclick="setFeedClass('${c}')" style="padding:6px 16px; border-radius:16px; border:1px solid ${state.feed.classFilter === c ? 'var(--blue)' : 'rgba(255,255,255,0.2)'}; background:${state.feed.classFilter === c ? 'var(--blue)' : 'transparent'}; color:white; font-weight:700; cursor:pointer; font-size: 13px; white-space:nowrap;">${c}</button>
                    `).join('')}
                </div>

                ${renderPollWidget()}

                ${displayPosts.length ? displayPosts.map(renderPostCard).join('') : `<div style="text-align:center; opacity:0.5; padding:32px;">Nessun post</div>`}
            </div>`;
        }

        function renderMessages() {
            const conversations = state.threads || [];
            const searchVal = (state.msgSearch || '').toLowerCase();

            const filteredConv = conversations.filter(t => t.otherName.toLowerCase().includes(searchVal));
            const directoryMatches = searchVal.length > 1 ? DIRECTORY.filter(u =>
                u.name.toLowerCase().includes(searchVal) &&
                !conversations.some(c => c.otherId === u.id) &&
                u.id !== getUserId()
            ) : [];

            return `
            <div class="view" style="padding-top:0;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin: 10px 0; padding: 0 16px;">
                     <button onclick="navigate('home')" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;"><i class="ph ph-arrow-left"></i></button>
                     <h1 style="margin:0; text-align:center; flex:1; font-weight:800; font-size:22px;">Messaggi</h1>
                     <div style="width:24px;"></div>
                </div>

                <div style="padding: 0 16px 12px 16px;">
                    <div class="search-bar" style="margin-bottom:20px; background:rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius:14px; padding:2px 12px; display:flex; align-items:center;">
                        <i class="ph ph-magnifying-glass" style="opacity:0.5; margin-right:8px;"></i>
                        <input type="text" placeholder="Cerca persone..." value="${state.msgSearch || ''}" 
                            oninput="state.msgSearch = this.value; render();"
                            style="background:none; border:none; color:white; height:40px; flex:1; outline:none; font-size:15px;">
                    </div>

                    ${searchVal.length > 1 && directoryMatches.length > 0 ? `
                        <div style="font-size:12px; font-weight:700; color:var(--primary); margin-bottom:12px; letter-spacing:0.5px; text-transform:uppercase;">Suggeriti</div>
                        ${directoryMatches.map(u => `
                            <div onclick="openChat('${u.name}', '${u.id}')" style="display:flex; align-items:center; gap:14px; padding:12px; background: rgba(37, 99, 235, 0.1); border-radius: 18px; margin-bottom: 8px; cursor:pointer; border: 1px solid rgba(37, 99, 235, 0.2);">
                                ${renderAvatar(u.name, 44)}
                                <div style="flex:1;">
                                    <div style="font-weight:700; font-size:15px; color:white;">${u.name}</div>
                                    <div style="font-size:12px; color:rgba(255,255,255,0.5);">${u.class}</div>
                                </div>
                                <i class="ph ph-plus-circle" style="color:var(--primary); font-size:20px;"></i>
                            </div>
                        `).join('')}
                        <div style="height:20px;"></div>
                    ` : ''}

                    <div style="font-size:12px; font-weight:700; color:rgba(255,255,255,0.4); margin-bottom:12px; letter-spacing:0.5px; text-transform:uppercase;">Conversazioni</div>
                    
                    ${filteredConv.length > 0 ? filteredConv.map(t => `
                        <div onclick="openChat('${t.otherName}', '${t.otherId}')" style="display:flex; align-items:center; gap:14px; padding:16px; background: rgba(255,255,255,0.04); border-radius: 20px; margin-bottom: 12px; cursor:pointer; border: 1px solid rgba(255,255,255,0.03);">
                            ${renderAvatar(t.otherName, 50)}
                            <div style="flex:1; text-align:left; min-width:0;">
                                <div style="font-weight:700; font-size:16px; color:white; margin-bottom:2px;">${t.otherName}</div>
                                <div style="font-size:13px; color:rgba(255,255,255,0.6); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                                    ${t.lastText}
                                </div>
                            </div>
                            <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
                                <div style="font-size:10px; color:rgba(255,255,255,0.3);">${new Date(t.lastTime).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}</div>
                                ${t.unread ? `<div style="width:10px; height:10px; background:var(--primary); border-radius:50%;"></div>` : ''}
                            </div>
                        </div>
                    `).join('') : `
                        <div style="text-align:center; padding: 60px 20px; color:rgba(255,255,255,0.3);">
                            <i class="ph ph-chat-circle-slash" style="font-size:48px; margin-bottom:16px; display:block;"></i>
                            Non hai ancora conversazioni attive.
                        </div>
                    `}
                </div>
            </div>`;
        }

        function renderPostCard(post) {
            const isPoll = post.type === 'poll';
            const commentsHtml = (post.comments || []).map(c => `
                <div style="display:flex; align-items:center; gap:8px; padding:8px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 4px;">
                    ${renderAvatar(c.author || 'Utente', 28)}
                    <div style="flex:1; text-align:left;">
                        <div style="font-weight:700; font-size:12px; color:white;">${c.author || 'Utente'}</div>
                        <div style="font-size:12px; color:rgba(255,255,255,0.8);">${c.text}</div>
                    </div>
                </div>
            `).join('');

            return `
            <div class="card">
                <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
                    ${post.anon ? renderAvatar('Anonimo', 40) : renderAvatar(post.author || 'Utente', 40)}
                    <div style="flex:1; text-align:left;">
                        <div style="font-weight:700; color:white;">${post.anon ? 'Anonimo' : (post.author || 'Utente')}</div>
                        <div style="font-size:12px; opacity:0.6; color:var(--text-muted);">${post.anon ? 'Studente' : (post.class || '')}</div>
                    </div>
                    <button onclick="togglePinPost(${post.id})" title="Fissa" style="background:none; border:none; color:${post.pinned ? 'var(--yellow)' : 'var(--text-muted)'}; cursor:pointer;"><i class="ph ph-pushpin"></i></button>
                </div>

                ${!isPoll ? `<p style="margin: 0 0 10px 0; text-align:left; color:white;">${post.text}</p>` : renderPoll(post)}

                ${post.image ? `<img src="${post.image}" style="width:100%; border-radius:12px; margin-bottom:12px;">` : ''}

                <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:10px; display:flex; gap:16px;">
                    ${(() => {
                    const userId = getUserId();
                    const isLiked = Array.isArray(post.likes) ? post.likes.includes(userId) : !!post.liked;
                    const likesCount = Array.isArray(post.likes) ? post.likes.length : (post.likes || 0);
                    return `<button onclick="toggleLike(${post.id})" style="background:none; border:none; color:${isLiked ? 'var(--red)' : 'var(--text-muted)'}; cursor:pointer; font-size:14px;"><i class="${isLiked ? 'ph-fill' : 'ph'} ph-heart"></i> ${likesCount}</button>`;
                })()}
                    <button onclick="toggleCommentBox(${post.id})" style="background:none; border:none; color: var(--text-muted); cursor:pointer; font-size:14px;"><i class="ph ph-chat-circle"></i> Commenta</button>
                </div>

                <div id="comments-${post.id}" style="margin-top:10px;">${commentsHtml}</div>
                <div id="comment-box-${post.id}" style="display:none; margin-top:8px;">
                    <div style="display:flex; gap:8px;">
                        <input id="comment-input-${post.id}" placeholder="Scrivi un commento..." style="margin-bottom:0; height:34px; font-size:14px;">
                        <button onclick="addCommentToPost(${post.id})" style="background: var(--blue); color:white; border:none; border-radius: 10px; padding: 0 12px; font-weight:700; height:34px; font-size:13px;">Invia</button>
                    </div>
                </div>
            </div>`;
        }

        function renderPoll(post) {
            const options = post.pollOptions || [];
            const votes = post.pollVotes || {};
            const total = Object.values(votes).reduce((a, b) => a + b, 0);
            return `
            <div style="margin-bottom:12px; text-align:left;">
                <h3 style="margin:0 0 10px 0; font-size:16px; text-align:left; color:white;">${post.text}</h3>
                ${options.map(opt => {
                const v = votes[opt] || 0;
                const pct = total ? Math.round((v / total) * 100) : 0;
                return `
                   <div onclick="votePoll(${post.id}, '${opt}')" style="padding:10px; border:1px solid rgba(255,255,255,0.2); border-radius:12px; margin-bottom:8px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.05);">
                       <span style="color:white; font-size:14px;">${opt}</span><span style="color:var(--text-muted); font-size:13px;">${pct}%</span>
                   </div>`;
            }).join('')}
            </div>`;
        }

        function renderChatMessage(m) {
            const isMe = m.me;
            const isPending = m.status === 'pending';
            const isFailed = m.status === 'failed';

            const timeStr = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('it-IT', {
                hour: '2-digit', minute: '2-digit'
            }) : '';

            const statusIcon = isPending ? '<i class="ph ph-clock"></i>' :
                isFailed ? '<i class="ph ph-warning" style="color:var(--red);"></i>' :
                    (isMe ? '<i class="ph ph-check"></i>' : '');

            return `
            <div style="display:flex; justify-content:${isMe ? 'flex-end' : 'flex-start'}; padding:2px 0;">
                <div class="message-bubble ${isMe ? 'msg-me' : 'msg-other'} ${isPending ? 'msg-pending' : ''} ${isFailed ? 'msg-failed' : ''}">
                    <div style="word-break: break-word;">${m.text}</div>

        function renderWeeklyAgenda() {
            const plannedWithDates = [];
            Object.entries(state.plannedTasks).forEach(([dateStr, taskIds]) => {
                taskIds.forEach(id => {
                    const task = state.tasks.find(t => t.id === id);
                    if (task) plannedWithDates.push({ ...task, plannedDate: dateStr });
                });
            });
            plannedWithDates.sort((a, b) => new Date(a.plannedDate) - new Date(b.plannedDate));

            // Filtra solo date da oggi in poi
            const filtered = plannedWithDates.filter(t => isFutureOrToday(t.plannedDate));

            if (!filtered.length) return `<div style="text-align: center; opacity: 0.5; font-size: 14px; padding: 20px; color:white;">Nessun compito pianificato (o già passati).</div>`;

            const dayNames = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
            return filtered.map(t => {
                const d = new Date(t.plannedDate);
                const label = `${dayNames[d.getDay()]} ${d.getDate()}`;
                const subjectColor = getSubjectColor(t.subject);
                return `
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">
                    <div style="min-width: 54px; font-size: 11px; font-weight: 800; color: var(--orange); text-transform: uppercase;">${label}</div>
                    <div onclick="toggleTask('${t.id}')" style="width: 22px; height: 22px; border: 2px solid ${t.done ? 'var(--green)' : subjectColor}; background: ${t.done ? 'var(--green)' : 'transparent'}; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer;">
                        ${t.done ? '<i class="ph-bold ph-check" style="font-size: 14px; color: black;"></i>' : ''}
                    </div>
                    <div style="flex: 1; text-align:left;">
                        <div style="font-size: 15px; color: white; font-weight: 500; ${t.done ? 'text-decoration: line-through; opacity: 0.4;' : ''}">${t.text}</div>
                        <div style="font-size: 11px; color: ${subjectColor}; font-weight: 800; text-transform: uppercase;">${t.subject}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // Dettagli Stress: grafico storico ultimi 14 giorni (linea)
        function showStressDetailsModal() {
            const days = 14;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const points = [];
            const modalContainer = getModalContainer();
            if (!modalContainer) return;

            for (let i = days - 1; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const iso = d.toISOString().split('T')[0];
                const lv = state.stressLevels[iso] || 0;
                points.push({ date: iso, lv, x: ((days - 1 - i) / (days - 1)) * 280, y: 100 - (lv / 5) * 80 });
            }
            const path = points.map((p, idx) => (idx === 0 ? `M ${p.x.toFixed(1)} ${p.y.toFixed(1)}` : `L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`)).join(' ');

            modalContainer.innerHTML = `
                <div class="modal-overlay" onclick="closeModal(event)">
                    <div class="modal-content glass-panel" style="max-width: 520px; padding: 20px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                            <h2 style="margin:0;">Stress • Ultimi ${days} giorni</h2>
                            <button onclick="closeModal()" style="background:none; border:none; color:#60a5fa; font-weight:700;">Chiudi</button>
                        </div>
                        <div style="width:100%; height:160px; background: rgba(76,29,149,0.18); border:1px solid rgba(255,255,255,0.18); border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                            <svg viewBox="0 0 300 120" width="100%" height="100%" preserveAspectRatio="none">
                                <defs>
                                    <linearGradient id="stressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.65" /><stop offset="100%" stop-color="#7c3aed" stop-opacity="0.0" />
                                    </linearGradient>
                                </defs>
                                <path d="${path}" stroke="#a78bfa" stroke-width="3" fill="none" stroke-linecap="round" />
                                <path d="${path} L 280 120 L 0 120 Z" fill="url(#stressGrad)" />
                            </svg>
                        </div>
                        <div style="display:flex; gap:8px; margin-top:12px;">
                            ${[1, 2, 3, 4, 5].map(lv => `<button onclick="setStressLevel(${lv}, true)" class="btn-primary" style="flex:1; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.22); color:white; font-weight:800;">${lv}</button>`).join('')}
                        </div>
                    </div>
                </div>`;
        }

        // setStressLevel(lv, inModal): aggiorna fluido
        function setStressLevel(lv, inModal = false) {
            const todayStr = new Date().toISOString().split('T')[0];
            state.stressLevels[todayStr] = lv;
            saveTasks();
            savePlannerRemote();
            debouncedSavePlannerRemote();

            if (inModal) {
                document.querySelectorAll('.stress-pill').forEach(p => {
                    p.classList.toggle('active', Number(p.getAttribute('data-stress')) === lv);
                });
            }

            // Aggiorna badge in Home
            const stressBadge = document.querySelector('.stress-card');
            if (stressBadge) {
                const existingBadge = stressBadge.querySelector('[data-stress-badge]');
                if (existingBadge) existingBadge.remove();
                const badge = document.createElement('div');
                badge.setAttribute('data-stress-badge', '');
                badge.style = "position:absolute; bottom:10px; right:12px; background: rgba(255,255,255,0.18); color:#fff; font-size:11px; font-weight:800; padding: 4px 8px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.28);";
                badge.textContent = String(lv);
                stressBadge.appendChild(badge);
            }
            // Trigger animazione onda live
            if (typeof initStressWaveFromState === 'function') {
                initStressWaveFromState();
            }
        }
        // MODIFICA: showPlanWeekModal mostra i PROSSIMI 7 giorni a partire da OGGI

                                    </div>

            }).join('')}
                        </div>
                        <button onclick="closeModal()" class="btn-primary" style="margin-top: 20px;">Fatto</button>
                    </div>

        function togglePlanDay(taskId, dateStr) {
            if (event) event.stopPropagation();
            // ✅ FIX: Accetta qualsiasi data futura (non solo settimana corrente)
            const selectedDate = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            if (selectedDate < today) return; // Solo blocca date passate

            if (!state.plannedTasks[dateStr]) state.plannedTasks[dateStr] = [];
            const index = state.plannedTasks[dateStr].indexOf(taskId);
            if (index > -1) {
                state.plannedTasks[dateStr].splice(index, 1);
            } else {
                state.plannedTasks[dateStr].push(taskId);
            }

            saveTasks();
            savePlannerRemote();
            debouncedSavePlannerRemote();
            updateWeekDayButton(taskId, dateStr);
            notifyPlannerChanged(); // ✅ aggiorna Planner e Home SUBITO
        }

        function updateWeekDayButton(taskId, dateStr) {
            const isPlanned = state.plannedTasks[dateStr] && state.plannedTasks[dateStr].includes(taskId);
            const buttons = document.querySelectorAll(`[data - task - id="${taskId}"][data - date="${dateStr}"]`);
            buttons.forEach(btn => {
                if (isPlanned) {
                    btn.style.background = 'var(--green)';
                    btn.style.borderColor = 'var(--green)';
                    btn.style.color = 'black';
                } else {
                    btn.style.background = 'rgba(255,255,255,0.08)';
                    btn.style.borderColor = 'rgba(255,255,255,0.1)';
                    btn.style.color = 'white';
                }
            });
        }

        async function addCommentToPost(id) {
            const input = document.getElementById(`comment - input - ${id} `);
            if (!input || !input.value.trim()) return;
            const post = state.posts.find(p => p.id === id);
            if (post) {
                const comment = { author: state.user.name, text: input.value };
                if (!post.comments) post.comments = [];
                post.comments.push(comment);
                input.value = '';
                localStorage.setItem(globalKey('posts'), JSON.stringify(state.posts));
                render();

                try {
                    const res = await fetch(`${API_BASE_URL} /api/posts / ${id}/comment`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(comment)
                    });
                    const data = await res.json();
                    if (data.success) {
                        post.comments = data.comments;
                        localStorage.setItem(globalKey('posts'), JSON.stringify(state.posts));
                        render();
                    }
                } catch (e) {
                    console.error("Comment failed:", e);
                }
            }
        }

        async function checkServerHealth(attempt = 1) {
            const statusEl = document.getElementById('server-status');
            if (!statusEl) return;

            try {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), 3500);

                const res = await fetch(`${API_BASE_URL}/health`, {
                    method: 'GET',
                    signal: controller.signal
                });
                clearTimeout(id);

                if (res.ok) {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--green); border-radius: 50%;"></span> Server Online`;
                    statusEl.style.color = "var(--green)";
                } else {
                    throw new Error("Server error");
                }
            } catch (e) {
                if (attempt < 15) {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--orange); border-radius: 50%;"></span> Sveglio il server (${attempt})...`;
                    setTimeout(() => checkServerHealth(attempt + 1), 2500);
                } else {
                    statusEl.innerHTML = `<span style="width: 8px; height: 8px; background: var(--red); border-radius: 50%;"></span> Offline (uso dati cached)`;
                    statusEl.style.color = "var(--red)";
                }
            }
        }

        async function performArgoSync(profileIndex = null, passedCreds = null) {
            const inputSchool = document.getElementById('argo-school');
            const inputUser = document.getElementById('argo-user');
            const inputPass = document.getElementById('argo-pass');

            const credentials = passedCreds || {
                schoolCode: (inputSchool ? inputSchool.value : (tempCreds.school || "")).trim(),
                username: (inputUser ? inputUser.value : (tempCreds.user || "")).trim(),
                password: inputPass ? inputPass.value : (tempCreds.pass || "")
            };

            if (!credentials.schoolCode || !credentials.username || !credentials.password) {
                alert("Dati mancanti! Reinserisci le credenziali.");
                if (!inputSchool) render();
                return;
            }

            if (inputSchool) tempCreds = { school: credentials.schoolCode, user: credentials.username, pass: credentials.password };

            setLoginBtnText("Connessione... ");

            try {
                const payload = {
                    schoolCode: credentials.schoolCode,
                    username: credentials.username,
                    password: credentials.password,
                    profileIndex: profileIndex
                };

                // Fallback a profilo salvato se non specificato
                if (profileIndex === null) {
                    const savedSession = sessionManager.load();
                    if (savedSession && savedSession.profileIndex !== undefined) {
                        payload.profileIndex = savedSession.profileIndex;
                    }
                }

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);

                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                clearTimeout(timeoutId);

                const data = await response.json();

                if (response.ok && data.status === 'MULTIPLE_PROFILES') {
                    showProfileSelectionModal(data.profiles, credentials);
                    return;
                }

                if (!response.ok) throw new Error(data.error || "Errore Server");

                if (data.success) {
                    handleLoginSuccess(data, credentials.password);
                } else {
                    throw new Error(data.error || "Login fallito");

        async function handleLoginSuccess(data, rawPassword) {
            console.log("✅ Login OK, hydrating state...");

            const user = data.session.userName;
            const pass = rawPassword || tempCreds.pass;

            // 1. Sessione
            if (data.session) {
                data.session.storedUser = btoa(unescape(encodeURIComponent(user)));
                data.session.storedPass = btoa(unescape(encodeURIComponent(pass)));
                sessionManager.save(data.session);
            }

            // 2. Idratazione Identità (con validazione) (Bug #5)
            state.user = state.user || {};
            if (data.student) {
                // Nome: valida che non sia username
                // Nome: Priorità a selectedProfile se disponibile (contiene dati più ricchi se student è fallback)
                const profileName = data.selectedProfile?.name;
                const studentName = data.student.name;

                if (profileName && isValidName(profileName)) {
                    state.user.name = profileName;
                    console.log("✅ Nome da selectedProfile:", profileName);
                } else if (isValidName(studentName)) {
                    state.user.name = studentName;
                    console.log("✅ Nome da student object:", studentName);
                } else {
                    console.warn("⚠️ Nome non valido o assente:", profileName || studentName);
                    // Fallback finale
                    if (!state.user.name || !isValidName(state.user.name)) {
                        state.user.name = "Studente";
                    }
                }

                // Classe: Simile priorità
                const profileClass = data.selectedProfile?.class;
                const studentClass = data.student.class;

                if (profileClass && isValidClass(profileClass)) {
                    state.user.class = profileClass;
                    console.log("✅ Classe da selectedProfile:", profileClass);
                } else if (isValidClass(studentClass)) {
                    state.user.class = studentClass;
                    console.log("✅ Classe da student object:", studentClass);
                } else {
                    state.user.class = studentClass || "N/D";
                }

                // Specialization (Fix for persistent profile)
                if (data.student.specialization) {
                    state.user.specialization = data.student.specialization;
                    console.log("✅ Indirizzo ricevuto:", state.user.specialization);
                }
            }

            // ✅ FIX: normalizza sempre la classe prima di salvare
            const normalized = normalizeClassUi(state.user.class);
            if (normalized) state.user.class = normalized;

            // Salva con dati validati
            localStorage.setItem(lsKey('user'), JSON.stringify(state.user));

            // 4. Planner: Reset e poi Sync
            state.plannedTasks = {};
            state.stressLevels = {};

            try {
                await fetchPlannerRemote(); // Questo farà merge intelligente
            } catch (e) {
                console.warn("Recupero planner remoto fallito, uso cache locale");
            }

            // Fallback locale solo se remoto vuoto
            if (Object.keys(state.plannedTasks).length === 0) {
                state.plannedTasks = JSON.parse(localStorage.getItem(lsKey('planned_tasks')) || '{}');
            }
            if (Object.keys(state.stressLevels).length === 0) {
                state.stressLevels = JSON.parse(localStorage.getItem(lsKey('stress_levels')) || '{}');
            }
            state.reminders = JSON.parse(localStorage.getItem(lsKey('reminders')) || '[]');

            notifyPlannerChanged();

            // 3. Idratazione Dati Scolastici
            if (data.tasks) {
                updateTasks(data.tasks, false);
                console.log("✅ Compiti caricati:", state.tasks.length);
            }
            if (data.voti) {
                state.voti = Array.isArray(data.voti) ? data.voti : [];
                localStorage.setItem(lsKey('voti'), JSON.stringify(state.voti));
            }
            if (data.promemoria || data.announcements) {
                state.promemoria = Array.isArray(data.promemoria || data.announcements) ? (data.promemoria || data.announcements) : [];
                localStorage.setItem(lsKey('promemoria'), JSON.stringify(state.promemoria));
            }

            // 4. PlannerLocali
            state.plannedTasks = JSON.parse(localStorage.getItem(lsKey('planned_tasks')) || '{}');
            state.stressLevels = JSON.parse(localStorage.getItem(lsKey('stress_levels')) || '{}');
            state.reminders = JSON.parse(localStorage.getItem(lsKey('reminders')) || '[]');

            state.isLoggedIn = true;
            state.didup.connected = true;
            state.isOffline = false;
            state.lastSync = new Date().toLocaleTimeString();
            updateOfflineBadge();

            Promise.all([
                fetchPlannerRemote(),
                loadProfileFromServer()
            ]).then(() => {
                closeModal();
                alert(`✅ Benvenuto ${state.user.name}!`);
                navigate('home');
                render();
                startThreadsPolling();
            });
        }

                    const user = decodeURIComponent(escape(atob(stored.storedUser)));

                    // Chiamata Login SENZA profileIndex, per forzare la lista profili se multipli

                    };

                    const response = await fetch(`${API_BASE_URL}/login`, {
                        method: 'POST',

                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                        showProfileSelectionModal(data.profiles, {

                id: Date.now(),
                author: isAnon ? "Studente" : (state.user.name || "Utente"),
                authorId: getUserId(),

                anon: isAnon,
                type: isPoll ? 'poll' : 'text',
                image: imgPreview ? imgPreview.src : null,
                comments: [],
                pinned: false
            };

                const optInputs = document.querySelectorAll('.poll-opt-input');
                const choices = Array.from(optInputs).map(i => ({ text: i.value.trim() })).filter(v => v.text !== '');

        function subscribeToChatRealtime(threadId) {
            if (!supabaseClient) return;
            if (chatChannel) {
                supabaseClient.removeChannel(chatChannel);
            }
            chatChannel = supabaseClient
                .channel(`chat:${threadId}`)
                .on('postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `thread_id=eq.${threadId}` },
                    (payload) => handleRealtimeMessage(payload.new, threadId)
                )
                .subscribe();
        }

        function handleRealtimeMessage(newMsg, threadId) {
            const myId = getUserId();
            const exists = state.messages[threadId]?.some(m => m.id === newMsg.id);
            if (!exists && newMsg.sender_id !== myId) {
                const msg = {
                    id: newMsg.id,
                    text: newMsg.text,
                    me: false,
                    timestamp: newMsg.created_at,
                    status: 'sent'
                };
                if (!state.messages[threadId]) state.messages[threadId] = [];
                state.messages[threadId].push(msg);
                state.messages[threadId].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                saveChatMessages(threadId); // Persistere messaggio ricevuto
                if (state.view === 'chat' && state.currentThreadId === threadId) {
                    updateChatUI();
                }
            }
        }

        async function sendChatMessage({ text, type = 'text', meta = {} }) {
            const threadId = state.currentThreadId;
            const receiverId = state.currentChatId;
            const receiverName = state.currentChatUser;
            const myId = getUserId();

            if (!text || !threadId || !receiverId) {
                console.warn("❌ sendChatMessage: missing params", { text, threadId, receiverId });
                return false;
            }

            // 1. Optimistic UI
            const localId = 'local_' + Date.now();
            const localMsg = {
                id: localId,
                text,
                me: true,
                timestamp: new Date().toISOString(),
                status: 'pending',
                type,
                meta
            };

            if (!state.messages[threadId]) state.messages[threadId] = [];
            state.messages[threadId].push(localMsg);
            saveChatMessages(threadId); // Persistenza ottimistica locale

            updateChatUI();
            scrollChatToBottom();

            try {
                // v7.0 - POST to new schema
                const res = await fetch(`${API_BASE_URL}/api/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversationId: threadId, // threadId is now conversationId
                        senderId: myId,
                        text,
                        type,
                        meta
                    })
                });

                const data = await res.json();
                if (data.success) {
                    // Update local with server ID
                    const idx = state.messages[threadId].findIndex(m => m.id === localId);
                    if (idx > -1) {
                        const serverMsg = data.data || {};
                        state.messages[threadId][idx] = {
                            ...state.messages[threadId][idx],
                            id: serverMsg.id || localId,
                            status: 'sent',
                            timestamp: serverMsg.created_at || localMsg.timestamp
                        };
                        saveChatMessages(threadId);
                    }
                    updateChatUI();
                    if (typeof fetchThreads === 'function') fetchThreads();
                    return true;
                } else {
                    throw new Error(data.error || 'Server error');
                }
            } catch (e) {
                console.error("❌ sendChatMessage error:", e);
                const idx = state.messages[threadId].findIndex(m => m.id === localId);
                if (idx > -1) {
                    state.messages[threadId][idx].status = 'failed';
                    saveChatMessages(threadId);
                }
                updateChatUI();
                return false;
            }
        }

        // Init - render will be called by DOMContentLoaded
        let __stressWaveRAF = null;

        /* Utilità canvas DPR-safe */
        function setupCanvas(canvas) {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            return { ctx, rect, dpr };
        }

        /* 3A) STRESS: onda animata (livello 0-10) */
        function renderStressWave(level = 5) {
            const canvas = document.getElementById('stressWaveCanvas');
            if (!canvas) return;
            const { ctx, rect } = setupCanvas(canvas);
            const W = rect.width, H = rect.height;

            // Parametri onda in base al livello
            const ampBase = 16;
            const amp = ampBase * (0.35 + (level / 10) * 0.65); // più livello → più ampiezza
            const freq = 0.018;
            const speed = 0.05;

            if (__stressWaveRAF) cancelAnimationFrame(__stressWaveRAF);
            let t = 0;

            function strokeGradient() {
                const g = ctx.createLinearGradient(0, 0, W, 0);
                g.addColorStop(0.00, '#c7b8ff');
                g.addColorStop(0.50, '#ffffff');
                g.addColorStop(1.00, '#c7b8ff');
                return g;
            }

            function draw() {
                if (!document.getElementById('stressWaveCanvas')) {
                    cancelAnimationFrame(__stressWaveRAF);
                    return;
                }
                // Pulisci, ma NON disegnare alcun rettangolo di sfondo
                ctx.clearRect(0, 0, W, H);

                // linea onda
                ctx.lineWidth = 3;
                ctx.strokeStyle = strokeGradient();
                ctx.shadowColor = 'rgba(255,255,255,0.35)';
                ctx.shadowBlur = 6;

                ctx.beginPath();
                const midY = H / 2;
                for (let x = 0; x <= W; x += 2) {
                    const y = midY + Math.sin(x * freq + t) * amp;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                t += speed;
                __stressWaveRAF = requestAnimationFrame(draw);
            }
            draw();
        }

        /* Dopo ogni render della Home, ridisegna l’onda con il livello odierno */
        function initStressWaveFromState() {
            const todayStr = new Date().toISOString().slice(0, 10);
            const level = (state.stressLevels && state.stressLevels[todayStr] != null)
                ? Number(state.stressLevels[todayStr]) : 5;
            renderStressWave(level);
        }

        /* 3B) MEDIA: gauge semicircolare animato (valore 0-10) */
        function renderMediaGauge(target = 0) {
            const canvas = document.getElementById('mediaGaugeCanvas');
            const valueEl = document.getElementById('mediaValue');
            if (!canvas || !valueEl) return;

            const { ctx, rect } = setupCanvas(canvas);
            const W = rect.width, H = rect.height;

            // Semicerchio inferiore
            const cx = W / 2, cy = H * 0.95;
            const radius = Math.min(W, H * 2) / 2.2;
            const start = Math.PI;      // 180°
            const endMax = 2 * Math.PI;   // 360°
            const lineW = 10;

            let current = Math.max(0, Math.min(10, Number(valueEl.dataset.current) || 0));

            function arcGradient() {
                const g = ctx.createLinearGradient(cx - radius, cy, cx + radius, cy);
                g.addColorStop(0.00, '#44d2ff');
                g.addColorStop(0.50, '#61e26c');
                g.addColorStop(1.00, '#9be15a');
                return g;
            }

            if (__mediaGaugeRAF) cancelAnimationFrame(__mediaGaugeRAF);

            function draw() {
                if (!document.getElementById('mediaGaugeCanvas')) {
                    cancelAnimationFrame(__mediaGaugeRAF);
                    return;
                }
                ctx.clearRect(0, 0, W, H);

                // fondo ghost
                ctx.lineWidth = lineW;
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.beginPath(); ctx.arc(cx, cy, radius, start, endMax, false); ctx.stroke();

                // progress
                const progress = (current / 10);
                const end = start + progress * Math.PI; // semicircolare (180° → 360°)
                ctx.lineWidth = lineW;
                ctx.strokeStyle = arcGradient();
                ctx.shadowColor = 'rgba(255,255,255,0.25)';
                ctx.shadowBlur = 8;
                ctx.beginPath(); ctx.arc(cx, cy, radius, start, end, false); ctx.stroke();

                // knob
                const knobX = cx + radius * Math.cos(end);
                const knobY = cy + radius * Math.sin(end);
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(knobX, knobY, 6, 0, Math.PI * 2); ctx.fill();

                // valore numerico
                valueEl.textContent = (Math.round(current * 100) / 100).toFixed(2);

                // easing verso target
                const diff = target - current;
                const step = Math.sign(diff) * Math.min(Math.abs(diff), 0.08);
                current = current + step;

                __mediaGaugeRAF = requestAnimationFrame(draw);
            }
            draw();

            valueEl.dataset.current = String(target);
        }

        function updateStressWidget(level) { renderStressWave(level); }

        function drawWeeklyStressChart(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            // DPR-safe
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            const ctx = canvas.getContext('2d');
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const W = rect.width, H = rect.height;

            // Calcola ultimi 7 giorni
            const days = 7;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const series = [];
            for (let i = days - 1; i >= 0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const iso = d.toISOString().slice(0, 10);
                const lv = Number(state.stressLevels?.[iso] ?? 0);
                series.push({ date: iso, level: lv });
            }

            // Sfondo
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, 0, W, H);

            // Assi
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(40, 16);
            ctx.lineTo(40, H - 28);
            ctx.lineTo(W - 12, H - 28);
            ctx.stroke();

            // Linea valori (0-10)
            const minX = 52, maxX = W - 24;
            const minY = 20, maxY = H - 40;
            const stepX = (maxX - minX) / Math.max(1, series.length - 1);

            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 2;
            ctx.beginPath();
            series.forEach((pt, i) => {
                const x = minX + i * stepX;
                const y = maxY - (pt.level / 10) * (maxY - minY);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                // punti
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
            });
            ctx.stroke();

            // Etichette giorno
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '11px system-ui';
            series.forEach((pt, i) => {
                const x = minX + i * stepX;
                const label = pt.date.slice(5); // MM-DD
                ctx.fillText(label, x - 12, H - 10);
            });
        }

        window.showStressCaptureModal = showStressCaptureModal;
        window.drawWeeklyStressChart = drawWeeklyStressChart;
