<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Connect AI - Briefing Mattutino</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #6366f1;
            --text-color: #f8fafc;
            --subtext-color: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            padding: 40px 0;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0;
            opacity: 0.8;
        }

        .visualizer-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .wave-svg {
            width: 100%;
            height: 150px;
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 2;
        }

        .status-container {
            padding: 20px 0;
        }

        .status {
            font-size: 0.9rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            height: 1.5rem;
        }

        .subtitles {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-color);
            padding: 20px;
            min-height: 150px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        .controls {
            padding: 40px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(99, 102, 241, 0.1);
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        .mic-btn:active {
            transform: scale(0.9);
        }

        .mic-btn.listening {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .hidden {
            display: none;
        }

        /* Wave Animation */
        .path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 5s linear infinite;
        }

        @keyframes dash {
            from {
                stroke-dashoffset: 1000;
            }

            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 id="clock">07:50</h1>
        </div>

        <div class="visualizer-container">
            <svg id="visualizer" class="wave-svg" viewBox="0 0 400 150">
                <path id="wavePath" d="M 0 75 Q 100 25 200 75 T 400 75" stroke="#6366f1" stroke-width="3"
                    fill="transparent" />
            </svg>
        </div>

        <div class="status-container">
            <div id="status" class="status">Inizializzazione...</div>
        </div>

        <div id="subtitles" class="subtitles">
            Benvenuto. Tocca il microfono per iniziare il briefing.
        </div>

        <div class="controls">
            <button id="micBtn" class="mic-btn">
                <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" />
                    <path
                        d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const API_BASE = ''; // Lascia vuoto se sullo stesso dominio
        let chatHistory = [];
        let isAITalking = false;
        let isListening = false;

        const micBtn = document.getElementById('micBtn');
        const statusEl = document.getElementById('status');
        const subtitleEl = document.getElementById('subtitles');
        const wavePath = document.getElementById('wavePath');
        const clockEl = document.getElementById('clock');

        // Aggiorna orologio
        setInterval(() => {
            const now = new Date();
            clockEl.textContent = now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // Animazione onda basata sullo stato
        function updateWave(amplitude = 0) {
            const base = 75;
            const amp = isAITalking ? 40 + Math.random() * 20 : (isListening ? 15 : 5);
            const d = `M 0 75 Q 100 ${base - amp} 200 75 T 400 75`;
            wavePath.setAttribute('d', d);
            if (isAITalking || isListening) {
                requestAnimationFrame(() => setTimeout(updateWave, 50));
            } else {
                wavePath.setAttribute('d', `M 0 75 Q 100 75 200 75 T 400 75`);
            }
        }

        // Web Speech API - Sintesi (TTS via API)
        async function speak(text) {
            isAITalking = true;
            statusEl.textContent = "AI sta parlando...";
            subtitleEl.textContent = text;
            updateWave();

            try {
                const res = await fetch('/api/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ testo: text })
                });

                if (!res.ok) throw new Error('TTS failed');

                const audioBlob = await res.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);

                return new Promise((resolve) => {
                    audio.onended = () => {
                        isAITalking = false;
                        URL.revokeObjectURL(audioUrl);
                        updateWave();
                        resolve();
                    };
                    audio.onerror = () => {
                        // Fallback su browser TTS if API fails
                        fallbackSpeak(text).then(resolve);
                    };
                    audio.play();
                });
            } catch (e) {
                console.error("TTS API error, falling back to browser", e);
                return fallbackSpeak(text);
            }
        }

        function fallbackSpeak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'it-IT';
            return new Promise((resolve) => {
                utterance.onend = () => {
                    isAITalking = false;
                    updateWave();
                    resolve();
                };
                window.speechSynthesis.speak(utterance);
            });
        }

        // Web Speech API - Riconoscimento (STT)
        function listen() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Riconoscimento vocale non supportato in questo browser.");
                return;
            }

            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'it-IT';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                statusEl.textContent = "In ascolto...";
                updateWave();
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                subtitleEl.textContent = `Tu: "${text}"`;
                handleUserMessage(text);
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                stopListening();
            };

            recognition.onend = () => {
                stopListening();
            };

            recognition.start();
        }

        function stopListening() {
            isListening = false;
            micBtn.classList.remove('listening');
            statusEl.textContent = "In attesa...";
        }

        // Gestione Messaggio Utente
        async function handleUserMessage(message) {
            statusEl.textContent = "AI sta pensando...";

            try {
                const res = await fetch(`${API_BASE}/api/morning-chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history: chatHistory })
                });

                const data = await res.json();
                if (data.success) {
                    chatHistory.push({ role: 'user', parts: [{ text: message }] });
                    chatHistory.push({ role: 'model', parts: [{ text: data.response }] });

                    if (data.response.toLowerCase().includes('ciao') ||
                        data.response.toLowerCase().includes('buona giornata') ||
                        data.response.toLowerCase().includes('spacca tutto')) {
                        await speak(data.response);
                        statusEl.textContent = "Sessione terminata.";
                    } else {
                        await speak(data.response);
                        listen(); // Torna in ascolto automaticamente
                    }
                }
            } catch (e) {
                console.error("Chat error", e);
                speak("Scusa Andrea, ho avuto un piccolo problema di connessione.");
            }
        }

        // Start Briefing
        async function startBriefing() {
            statusEl.textContent = "Generazione briefing...";
            try {
                const res = await fetch(`${API_BASE}/api/morning-briefing`);
                const data = await res.json();

                if (data.success) {
                    await speak(data.briefing);
                    listen(); // Attiva microfono dopo il briefing
                } else {
                    await speak("Buongiorno Andrea! Non sono riuscito a recuperare i tuoi impegni, ma ti auguro comunque una splendida giornata.");
                }
            } catch (e) {
                await speak("Buongiorno Andrea! C'è stato un errore nel recupero dei dati, ma sono pronto a parlare con te. Come stai?");
                listen();
            }
        }

        // Inizializzazione al click
        micBtn.onclick = () => {
            if (!isAITalking && !isListening) {
                startBriefing();
            }
        };

        // Service Worker & Push Subscription
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    const reg = await navigator.serviceWorker.register('/sw.js');
                    console.log('SW registrato:', reg.scope);

                    // Verifica se abbiamo già il permesso
                    if (Notification.permission === 'default') {
                        // Aspetta un'interazione se necessario o chiedi al caricamento
                        // Per una PWA è meglio chiedere dopo un'azione, ma qui automatizziamo per Andrea
                    }
                } catch (e) {
                    console.error('SW registration failed:', e);
                }
            });
        }
    </script>
</body>

</html>
